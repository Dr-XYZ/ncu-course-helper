<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排課表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .grid-timetable {
            display: grid;
            grid-template-columns: 60px repeat(5, 1fr);
            grid-template-rows: auto repeat(14, 1fr);
            gap: 1px;
            background-color: #cbd5e1;
            border: 1px solid #cbd5e1;
        }

        .time-slot { 
            background: white; 
            min-height: 70px; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .time-header { 
            background: #f8fafc; 
            font-weight: bold; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            min-height: 40px;
            font-size: 0.875rem;
            color: #475569;
        }

        .course-block {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            text-align: center;
            line-height: 1.2;
            flex-grow: 1;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .course-block:last-child { border-bottom: none; }

        .card-selected {
            border: 2px solid #4f46e5 !important;
            background-color: #f5f3ff !important;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1) !important;
        }

        .is-conflict { box-shadow: inset 0 0 0 3px #ef4444 !important; z-index: 5; }
        .conflict-tag {
            position: absolute; top: 0; right: 0; background: #ef4444; color: white;
            font-size: 9px; padding: 1px 5px; border-bottom-left-radius: 6px; z-index: 20; font-weight: 800;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .popup-fade { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="app" class="max-w-7xl mx-auto p-4 lg:p-8">
    <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">三年修課大計 <span class="text-indigo-600">Planner</span></h1>
            <p class="text-slate-500 font-medium mt-1">GitHub Pages 同步版：自動載入 s/ 資料夾下的 CSV</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="openCreditModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl shadow-lg flex items-center gap-2 transition cursor-pointer border-none font-bold active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                已抵免科目
            </button>
            <button onclick="openImportModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-6 py-3 rounded-2xl shadow-md flex items-center gap-2 transition cursor-pointer border-none font-bold active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                手動上傳數據
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sticky top-6">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-black text-slate-800">搜尋篩選</h2>
                    <span id="search-info" class="text-[11px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">連線中...</span>
                </div>
                
                <div class="flex p-1 bg-slate-100 rounded-xl mb-4">
                    <button id="search-fall-btn" onclick="setSearchSemester('F')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all border-none cursor-pointer">上學期 (1.csv)</button>
                    <button id="search-spring-btn" onclick="setSearchSemester('S')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all border-none cursor-pointer">下學期 (2.csv)</button>
                </div>

                <div class="relative group">
                    <input type="text" id="course-search" oninput="filterCourses()" placeholder="輸入關鍵字、教師..." class="w-full pl-10 pr-4 py-3 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none mb-2 text-slate-700 font-medium">
                    <svg class="absolute left-3 top-3.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
                </div>

                <div id="course-results" class="space-y-3 max-h-[calc(100vh-450px)] overflow-y-auto pr-2 mt-4">
                    <p class="text-center text-slate-400 py-10 animate-pulse font-bold">載入中...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="flex flex-wrap gap-2" id="semester-selector"></div>
            <div class="bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        </div>
                        <div>
                            <h3 id="current-semester-title" class="font-black text-slate-800 text-xl">載入中...</h3>
                            <span id="sem-type-tag" class="text-[10px] px-2 py-0.5 rounded font-black tracking-widest uppercase"></span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <div class="flex flex-col items-center px-4 py-2 bg-white rounded-2xl border border-slate-100">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">已抵免</span>
                            <span class="text-emerald-600 font-black" id="credited-credits-stats">0</span>
                        </div>
                        <div class="flex flex-col items-center px-4 py-2 bg-white rounded-2xl border border-slate-100">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">本期</span>
                            <span class="text-indigo-600 font-black" id="total-credits">0</span>
                        </div>
                        <div class="flex flex-col items-center px-4 py-2 bg-slate-900 rounded-2xl shadow-lg">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">累計畢業</span>
                            <span class="text-white font-black" id="overall-total">0</span>
                        </div>
                    </div>
                </div>

                <div class="p-6 overflow-x-auto">
                    <div class="grid-timetable rounded-2xl overflow-hidden min-w-[700px]" id="timetable-grid">
                        <div class="time-header"></div>
                        <div class="time-header">週一</div><div class="time-header">週二</div><div class="time-header">週三</div><div class="time-header">週四</div><div class="time-header">週五</div>
                        <script>
                            const pds = ['1','2','3','4','Z','5','6','7','8','9','A','B','C','D'];
                            pds.forEach(p => {
                                document.write(`<div class="bg-slate-50 font-black border-r border-slate-200 text-slate-300 flex items-center justify-center text-xs h-[70px]">${p}</div>`);
                                for(let d=0; d<5; d++) document.write(`<div class="time-slot" id="slot-${d}-${p}"></div>`);
                            });
                        </script>
                    </div>
                </div>
                <div class="p-8 bg-slate-50/30">
                    <div id="semester-course-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="credit-modal" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden popup-fade">
        <div class="p-10 border-b border-slate-100 flex justify-between items-center bg-emerald-600 text-white">
            <div>
                <h2 class="text-3xl font-black">抵免科目管理</h2>
                <p class="text-emerald-50 mt-1">勾選後搜尋結果將隱藏同名課程</p>
            </div>
            <button onclick="closeCreditModal()" class="bg-white/20 hover:bg-white/40 text-white p-3 rounded-full cursor-pointer border-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="flex-1 flex overflow-hidden">
            <div id="all-subjects-list" class="w-2/3 overflow-y-auto p-8 space-y-8 bg-white border-r"></div>
            <div class="w-1/3 p-8 bg-slate-50 flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-black text-emerald-800 text-lg">已選抵免</h3>
                    <div class="bg-emerald-600 text-white px-4 py-2 rounded-2xl text-sm font-black" id="popup-credited-total">0 學分</div>
                </div>
                <div id="my-credited-list" class="flex-1 overflow-y-auto space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<div id="import-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-[32px] w-full max-w-2xl p-10">
        <h2 class="text-2xl font-black mb-6">手動上傳/覆寫 CSV</h2>
        <div class="flex gap-4 mb-8">
            <label class="flex-1 p-6 rounded-3xl border-2 border-slate-100 text-center cursor-pointer" id="label-fall">
                <input type="radio" name="import-sem" value="F" checked class="hidden" onclick="updateModalUI()">
                <div class="font-black text-slate-400" id="label-fall-text">上學期 (1.csv)</div>
            </label>
            <label class="flex-1 p-6 rounded-3xl border-2 border-slate-100 text-center cursor-pointer" id="label-spring">
                <input type="radio" name="import-sem" value="S" class="hidden" onclick="updateModalUI()">
                <div class="font-black text-slate-300" id="label-spring-text">下學期 (2.csv)</div>
            </label>
        </div>
        <textarea id="csv-input" class="w-full h-56 p-5 border-2 border-slate-100 rounded-3xl mb-6 outline-none" placeholder="貼上 CSV 內容..."></textarea>
        <div class="flex justify-end gap-4">
            <button onclick="closeImportModal()" class="px-6 py-3 font-bold cursor-pointer border-none bg-transparent">取消</button>
            <button onclick="processCSV()" class="px-10 py-3 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">匯入並存檔</button>
        </div>
    </div>
</div>

<script>
    // --- 狀態 ---
    let fallCourses = [];
    let springCourses = [];
    let planningData = { '2-F': [], '2-S': [], '3-F': [], '3-S': [], '4-F': [], '4-S': [] };
    let waivedSubjects = []; 
    let currentSem = '2-F';
    let searchSem = 'F';

    const semesterNames = { '2-F': '大二上學期', '2-S': '大二下學期', '3-F': '大三上學期', '3-S': '大三下學期', '4-F': '大四上學期', '4-S': '大四下學期' };
    const yearColorMap = {
        1: { bg: 'bg-emerald-500', border: 'border-emerald-600' },
        2: { bg: 'bg-blue-500', border: 'border-blue-600' },
        3: { bg: 'bg-amber-500', border: 'border-amber-600' },
        4: { bg: 'bg-purple-500', border: 'border-purple-600' },
        0: { bg: 'bg-slate-400', border: 'border-slate-500' }
    };

    // --- 初始化 ---
    async function init() {
        renderSemesterSelectors();
        loadFromStorage();
        updateModalUI();
        switchSemester('2-F');
        await fetchInitialCSV(); // 啟動自動載入
    }

    async function fetchInitialCSV() {
        const ts = new Date().getTime();
        const info = document.getElementById('search-info');
        try {
            const [r1, r2] = await Promise.all([
                fetch(`./1.csv?v=${ts}`),
                fetch(`./2.csv?v=${ts}`)
            ]);
            if (!r1.ok || !r2.ok) throw new Error("CSV 讀取失敗");
            
            const t1 = await r1.text();
            const t2 = await r2.text();

            Papa.parse(t1, { header: true, skipEmptyLines: true, complete: (res) => { fallCourses = res.data; filterCourses(); } });
            Papa.parse(t2, { header: true, skipEmptyLines: true, complete: (res) => { springCourses = res.data; filterCourses(); } });
            
            info.innerText = "資料同步成功";
        } catch (e) {
            console.warn("GitHub Pages 檔案載入失敗，可能檔案尚未 Push。", e);
            info.innerText = "請手動匯入數據";
            info.className = "text-[11px] font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded";
        }
    }

    // --- 核心邏輯 ---
    function getCourseYear(c) {
        if (!c) return 0;
        const info = (c['分發條件'] || '') + (c['課程名稱'] || '');
        if (info.includes('限一年級') || info.includes('大一')) return 1;
        if (info.includes('限二年級') || info.includes('大二')) return 2;
        if (info.includes('限三年級') || info.includes('大三')) return 3;
        if (info.includes('限四年級') || info.includes('大四')) return 4;
        return 0;
    }

    function renderSemesterSelectors() {
        const container = document.getElementById('semester-selector');
        container.innerHTML = '';
        Object.entries(semesterNames).forEach(([id, name]) => {
            const btn = document.createElement('button');
            btn.innerText = name;
            btn.className = `px-6 py-3 rounded-2xl text-sm font-black transition-all border-none cursor-pointer ${currentSem === id ? 'bg-indigo-600 text-white shadow-xl scale-105' : 'bg-white text-slate-400 hover:bg-slate-50'}`;
            btn.onclick = () => switchSemester(id);
            container.appendChild(btn);
        });
    }

    function switchSemester(id) {
        currentSem = id;
        const type = id.split('-')[1];
        setSearchSemester(type, false);
        document.getElementById('current-semester-title').innerText = semesterNames[id];
        const tag = document.getElementById('sem-type-tag');
        tag.innerText = type === 'F' ? '搜尋上學期開課' : '搜尋下學期開課';
        tag.className = `text-[10px] px-2 py-0.5 rounded font-black tracking-widest ${type === 'F' ? 'bg-orange-100 text-orange-600' : 'bg-teal-100 text-teal-600'}`;
        renderSemesterSelectors();
        updateDisplay();
        filterCourses();
    }

    function setSearchSemester(type, trigger = true) {
        searchSem = type;
        document.getElementById('search-fall-btn').className = type === 'F' ? "flex-1 py-2 text-xs font-black rounded-lg bg-white text-indigo-600 shadow-sm border-none" : "flex-1 py-2 text-xs font-black rounded-lg text-slate-400 border-none bg-transparent";
        document.getElementById('search-spring-btn').className = type === 'S' ? "flex-1 py-2 text-xs font-black rounded-lg bg-white text-indigo-600 shadow-sm border-none" : "flex-1 py-2 text-xs font-black rounded-lg text-slate-400 border-none bg-transparent";
        if(trigger) filterCourses();
    }

    function filterCourses() {
        const query = document.getElementById('course-search').value.toLowerCase();
        const db = searchSem === 'F' ? fallCourses : springCourses;
        if (!db.length) return;

        const waived = new Set(waivedSubjects.map(s => s.name));
        const selected = new Set(planningData[currentSem].map(c => c['流水號']));
        
        let filtered = db.filter(c => {
            const match = (c['課程名稱'] || "").toLowerCase().includes(query) || (c['授課教師'] || "").toLowerCase().includes(query) || (c['流水號'] || "").includes(query);
            return match && !waived.has(c['課程名稱']);
        });

        filtered.sort((a, b) => {
            const ya = getCourseYear(a) || 9; const yb = getCourseYear(b) || 9;
            if (ya !== yb) return ya - yb;
            const ca = a['選別'] === '必修' ? 0 : 1; const cb = b['選別'] === '必修' ? 0 : 1;
            if (ca !== cb) return ca - cb;
            return (a['課程名稱'] || "").localeCompare(b['課程名稱'] || "", 'zh-Hant');
        });

        const container = document.getElementById('course-results');
        container.innerHTML = '';
        filtered.slice(0, 50).forEach(c => {
            const year = getCourseYear(c);
            const colors = yearColorMap[year];
            const isSel = selected.has(c['流水號']);
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl border-2 transition ${isSel ? 'card-selected' : 'bg-white border-slate-100'}`;
            div.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="text-[9px] font-black px-2 py-0.5 rounded ${c['選別']==='必修'?'bg-red-500 text-white':'bg-slate-100 text-slate-400'}">${c['選別']}</span>
                    <span class="text-[9px] font-black px-2 py-0.5 rounded ${colors.bg} text-white">大${year||'?'}</span>
                </div>
                <h4 class="font-black text-slate-800 text-sm truncate">${c['課程名稱']}</h4>
                <p class="text-[10px] text-slate-400 font-medium">${c['授課教師']}</p>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-[9px] font-bold text-indigo-500 truncate mr-2">${c['時間/教室']||''}</span>
                    <button onclick="${isSel?`removeCourse('${c['流水號']}')`:`addCourse('${c['流水號']}')`}" class="px-3 py-1 text-[10px] rounded-lg font-black border-none cursor-pointer ${isSel?'bg-indigo-100 text-indigo-600':'bg-slate-900 text-white'}">${isSel?'取消':'加入'}</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.getElementById('search-info').innerText = `找到 ${filtered.length} 門`;
    }

    function parseTime(str) {
        if(!str || str === "無") return [];
        const slots = [];
        const dayMap = { 'Mon': 0, 'Tue': 1, 'Wed': 2, 'Thu': 3, 'Fri': 4 };
        str.split(' ').forEach(p => {
            const m = p.match(/(Mon|Tue|Wed|Thu|Fri)([0-9A-Za-z]+)/);
            if(m) {
                const day = dayMap[m[1]];
                m[2].split('').forEach(v => slots.push({ day, period: v }));
            }
        });
        return slots;
    }

    function addCourse(id) {
        const db = searchSem === 'F' ? fallCourses : springCourses;
        const c = db.find(x => x['流水號'] === id);
        if(c) { planningData[currentSem].push(c); saveToStorage(); updateDisplay(); filterCourses(); }
    }

    function removeCourse(id) {
        planningData[currentSem] = planningData[currentSem].filter(x => x['流水號'] !== id);
        saveToStorage(); updateDisplay(); filterCourses();
    }

    function updateDisplay() {
        const courses = planningData[currentSem];
        const periods = ['1','2','3','4','Z','5','6','7','8','9','A','B','C','D'];
        for(let d=0; d<5; d++) periods.forEach(p => { const s = document.getElementById(`slot-${d}-${p}`); s.innerHTML = ''; s.className = 'time-slot'; });

        let subTotal = 0;
        const grid = {};
        courses.forEach(c => {
            subTotal += parseFloat(c['學分']) || 0;
            parseTime(c['時間/教室']).forEach(t => {
                const k = `${t.day}-${t.period}`;
                if(!grid[k]) grid[k] = [];
                grid[k].push(c);
            });
        });

        Object.keys(grid).forEach(k => {
            const el = document.getElementById(`slot-${k}`);
            if(grid[k].length > 1) {
                el.classList.add('is-conflict');
                const b = document.createElement('div'); b.className = 'conflict-tag'; b.innerText = '衝堂'; el.appendChild(b);
            }
            grid[k].forEach(c => {
                const div = document.createElement('div');
                div.className = `course-block ${yearColorMap[getCourseYear(c)].bg} text-white text-[8px] font-black`;
                div.innerText = c['課程名稱'].substring(0, 6);
                el.appendChild(div);
            });
        });

        const creditedTotal = waivedSubjects.reduce((a, b) => a + b.credits, 0);
        document.getElementById('total-credits').innerText = subTotal;
        document.getElementById('credited-credits-stats').innerText = creditedTotal;
        document.getElementById('overall-total').innerText = subTotal + creditedTotal;

        const list = document.getElementById('semester-course-list');
        list.innerHTML = '';
        courses.forEach(c => {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between p-4 bg-white rounded-2xl border shadow-sm";
            div.innerHTML = `<div class="overflow-hidden"><p class="text-xs font-black truncate">${c['課程名稱']}</p><p class="text-[9px] text-slate-400 font-bold">${c['學分']}學分 | ${c['選別']}</p></div><button onclick="removeCourse('${c['流水號']}')" class="text-slate-300 hover:text-red-500 border-none bg-transparent cursor-pointer">✕</button>`;
            list.appendChild(div);
        });
    }

    // --- 抵免與匯入功能 ---
    function openCreditModal() { document.getElementById('credit-modal').classList.remove('hidden'); renderFullSubjectMenu(); renderWaivedList(); }
    function closeCreditModal() { document.getElementById('credit-modal').classList.add('hidden'); filterCourses(); updateDisplay(); }
    function renderFullSubjectMenu() {
        const container = document.getElementById('all-subjects-list');
        const db = [...fallCourses, ...springCourses];
        const waivedNames = new Set(waivedSubjects.map(s => s.name));
        const grouped = { 1: [], 2: [], 3: [], 4: [], 0: [] };
        const seen = new Set();
        db.forEach(c => { if(c['課程名稱'] && !seen.has(c['課程名稱'])) { seen.add(c['課程名稱']); grouped[getCourseYear(c)].push({ name: c['課程名稱'], credits: parseFloat(c['學分']) || 0 }); } });

        container.innerHTML = '';
        [1,2,3,4,0].forEach(y => {
            if(grouped[y].length === 0) return;
            const h = document.createElement('h4'); h.className = "text-xs font-black text-slate-300 uppercase mb-4"; h.innerText = `大${y||'其他'}課程`; container.appendChild(h);
            const g = document.createElement('div'); g.className = "grid grid-cols-2 gap-3 mb-8";
            grouped[y].sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant')).forEach(s => {
                const isW = waivedNames.has(s.name);
                const d = document.createElement('div');
                d.className = `p-3 rounded-xl flex justify-between items-center border transition ${isW?'bg-emerald-600 text-white border-emerald-600':'bg-slate-50 border-slate-100'}`;
                d.innerHTML = `<div class="overflow-hidden"><p class="text-[11px] font-black truncate">${s.name}</p></div><button onclick="${isW?`removeWaived('${s.name}')`:`addWaived('${s.name}',${s.credits})`}" class="ml-2 w-6 h-6 rounded-full border-none cursor-pointer ${isW?'bg-white text-emerald-600':'bg-white text-slate-300'}">${isW?'✓':'+'}</button>`;
                g.appendChild(d);
            });
            container.appendChild(g);
        });
    }
    function addWaived(name, credits) { waivedSubjects.push({ name, credits }); saveToStorage(); renderFullSubjectMenu(); renderWaivedList(); }
    function removeWaived(name) { waivedSubjects = waivedSubjects.filter(s => s.name !== name); saveToStorage(); renderFullSubjectMenu(); renderWaivedList(); }
    function renderWaivedList() {
        const c = document.getElementById('my-credited-list'); let t = 0; c.innerHTML = '';
        waivedSubjects.forEach(s => {
            t += s.credits; const d = document.createElement('div'); d.className = "p-3 bg-white rounded-xl shadow-sm border-l-4 border-emerald-500 flex justify-between items-center";
            d.innerHTML = `<p class="text-[11px] font-black truncate">${s.name}</p><button onclick="removeWaived('${s.name}')" class="text-slate-300 hover:text-red-500 border-none bg-transparent cursor-pointer">✕</button>`;
            c.appendChild(d);
        });
        document.getElementById('popup-credited-total').innerText = `${t} 學分`;
    }

    function openImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
    function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }
    function updateModalUI() {
        const v = document.querySelector('input[name="import-sem"]:checked').value;
        const lF = document.getElementById('label-fall'); const lS = document.getElementById('label-spring');
        lF.className = `flex-1 p-6 rounded-3xl border-2 text-center cursor-pointer ${v==='F'?'border-indigo-600 bg-white shadow-lg':'border-slate-100 bg-slate-50'}`;
        lS.className = `flex-1 p-6 rounded-3xl border-2 text-center cursor-pointer ${v==='S'?'border-indigo-600 bg-white shadow-lg':'border-slate-100 bg-slate-50'}`;
    }
    function processCSV() {
        const input = document.getElementById('csv-input').value;
        const type = document.querySelector('input[name="import-sem"]:checked').value;
        if(!input) return;
        Papa.parse(input, { header: true, skipEmptyLines: true, complete: (res) => {
            if(type === 'F') fallCourses = res.data; else springCourses = res.data;
            saveToStorage(); filterCourses(); closeImportModal();
        }});
    }

    function saveToStorage() { localStorage.setItem('transfer_v13', JSON.stringify({fallCourses, springCourses, planningData, waivedSubjects})); }
    function loadFromStorage() {
        const s = localStorage.getItem('transfer_v13');
        if(s) {
            const p = JSON.parse(s);
            fallCourses = p.fallCourses || []; springCourses = p.springCourses || [];
            planningData = p.planningData || planningData; waivedSubjects = p.waivedSubjects || [];
        }
    }

    window.onload = init;
</script>
</body>
</html>
