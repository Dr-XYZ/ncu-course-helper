<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轉系生三年課程規劃工具 - 自動載入版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .grid-timetable {
            display: grid;
            grid-template-columns: 60px repeat(5, 1fr);
            grid-template-rows: auto repeat(14, 1fr);
            gap: 1px;
            background-color: #cbd5e1;
            border: 1px solid #cbd5e1;
        }

        .time-slot { 
            background: white; 
            min-height: 70px; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .time-header { 
            background: #f8fafc; 
            font-weight: bold; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            min-height: 40px;
            font-size: 0.875rem;
            color: #475569;
        }

        .course-block {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            text-align: center;
            line-height: 1.2;
            flex-grow: 1;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .course-block:last-child { border-bottom: none; }

        .card-selected {
            border: 2px solid #4f46e5 !important;
            background-color: #f5f3ff !important;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1) !important;
        }

        .is-conflict { box-shadow: inset 0 0 0 3px #ef4444 !important; z-index: 5; }
        .conflict-tag {
            position: absolute; top: 0; right: 0; background: #ef4444; color: white;
            font-size: 9px; padding: 1px 5px; border-bottom-left-radius: 6px; z-index: 20; font-weight: 800;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .popup-fade { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="app" class="max-w-7xl mx-auto p-4 lg:p-8">
    <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">三年修課大計 <span class="text-indigo-600">Planner</span></h1>
            <p class="text-slate-500 font-medium mt-1">自動載入 1.csv (上) 與 2.csv (下) | 必修優先排序</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="openCreditModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl shadow-lg flex items-center gap-2 transition cursor-pointer border-none font-bold active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                已抵免科目
            </button>
            <button onclick="openImportModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-6 py-3 rounded-2xl shadow-md flex items-center gap-2 transition cursor-pointer border-none font-bold active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                手動更新資料庫
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sticky top-6">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-black text-slate-800">搜尋篩選</h2>
                    <span id="search-info" class="text-[11px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded"></span>
                </div>
                
                <div class="flex p-1 bg-slate-100 rounded-xl mb-4">
                    <button id="search-fall-btn" onclick="setSearchSemester('F')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all border-none cursor-pointer">上學期資料庫</button>
                    <button id="search-spring-btn" onclick="setSearchSemester('S')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all border-none cursor-pointer">下學期資料庫</button>
                </div>

                <div class="relative group">
                    <input type="text" id="course-search" oninput="filterCourses()" placeholder="輸入關鍵字、教師、流水號..." class="w-full pl-10 pr-4 py-3 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none mb-2 text-slate-700 font-medium">
                    <svg class="absolute left-3 top-3.5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
                </div>

                <div id="course-results" class="space-y-3 max-h-[calc(100vh-450px)] overflow-y-auto pr-2 mt-4">
                    <div class="text-center py-20">
                        <p class="text-slate-400 text-sm font-bold animate-pulse">正在載入 1.csv 與 2.csv...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="flex flex-wrap gap-2" id="semester-selector"></div>

            <div class="bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        </div>
                        <div>
                            <h3 id="current-semester-title" class="font-black text-slate-800 text-xl"></h3>
                            <span id="sem-type-tag" class="text-[10px] px-2 py-0.5 rounded font-black tracking-widest uppercase"></span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <div class="flex flex-col items-center px-4 py-2 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">已抵免</span>
                            <span class="text-emerald-600 font-black" id="credited-credits-stats">0</span>
                        </div>
                        <div class="flex flex-col items-center px-4 py-2 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">本期</span>
                            <span class="text-indigo-600 font-black" id="total-credits">0</span>
                        </div>
                        <div class="flex flex-col items-center px-4 py-2 bg-slate-900 rounded-2xl shadow-lg">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">累計畢業</span>
                            <span class="text-white font-black" id="overall-total">0</span>
                        </div>
                    </div>
                </div>

                <div class="p-6 overflow-x-auto">
                    <div class="grid-timetable rounded-2xl overflow-hidden min-w-[700px] shadow-inner" id="timetable-grid">
                        <div class="time-header"></div>
                        <div class="time-header">週一</div>
                        <div class="time-header">週二</div>
                        <div class="time-header">週三</div>
                        <div class="time-header">週四</div>
                        <div class="time-header">週五</div>
                        
                        <script>
                            const periods = ['1','2','3','4','Z','5','6','7','8','9','A','B','C','D'];
                            periods.forEach(p => {
                                document.write(`<div class="bg-slate-50 font-black border-r border-slate-200 text-slate-300 flex items-center justify-center text-xs h-[70px]">${p}</div>`);
                                for(let d=0; d<5; d++) {
                                    document.write(`<div class="time-slot" id="slot-${d}-${p}"></div>`);
                                }
                            });
                        </script>
                    </div>
                </div>

                <div class="p-8 border-t border-slate-50 bg-slate-50/30">
                    <div id="semester-course-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="credit-modal" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-md">
    <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-6xl h-[85vh] flex flex-col overflow-hidden popup-fade border border-white/20">
        <div class="p-10 border-b border-slate-100 flex justify-between items-center bg-emerald-600 text-white">
            <div>
                <h2 class="text-3xl font-black tracking-tight">抵免科目管理系統</h2>
                <p class="text-emerald-50 mt-1 font-medium">勾選已修過的科目，搜尋結果將自動隱藏同名課程</p>
            </div>
            <button onclick="closeCreditModal()" class="bg-white/20 hover:bg-white/40 text-white p-3 rounded-full transition cursor-pointer border-none flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-2/3 p-0 flex flex-col border-r border-slate-100 bg-white">
                <div id="all-subjects-list" class="flex-1 overflow-y-auto p-8 space-y-8"></div>
            </div>
            <div class="w-1/3 p-8 bg-slate-50 flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-black text-emerald-800 text-lg">已選抵免</h3>
                    <div class="bg-emerald-600 text-white px-4 py-2 rounded-2xl text-sm font-black shadow-lg shadow-emerald-200" id="popup-credited-total">0 學分</div>
                </div>
                <div id="my-credited-list" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
            </div>
        </div>
    </div>
</div>

<div id="import-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-2xl p-10">
        <h2 class="text-2xl font-black mb-6 text-slate-800">手動更新數據庫</h2>
        <div class="flex gap-4 mb-8">
            <label class="flex-1 p-6 rounded-3xl cursor-pointer transition-all border-2 border-slate-100 bg-slate-50 text-center" id="label-fall">
                <input type="radio" name="import-sem" value="F" checked class="hidden" onclick="updateModalUI()">
                <div class="font-black text-slate-400" id="label-fall-text">上學期 (1.csv)</div>
            </label>
            <label class="flex-1 p-6 rounded-3xl cursor-pointer transition-all border-2 border-slate-100 bg-slate-50 text-center" id="label-spring">
                <input type="radio" name="import-sem" value="S" class="hidden" onclick="updateModalUI()">
                <div class="font-black text-slate-400" id="label-spring-text">下學期 (2.csv)</div>
            </label>
        </div>
        <textarea id="csv-input" class="w-full h-56 p-5 border-2 border-slate-100 rounded-3xl font-mono text-[11px] mb-6 focus:ring-4 focus:ring-indigo-100 outline-none" placeholder="貼上 CSV 內容以覆蓋自動載入的資料..."></textarea>
        <div class="flex justify-end gap-4">
            <button onclick="closeImportModal()" class="px-6 py-3 text-slate-400 hover:text-slate-600 font-bold cursor-pointer border-none bg-transparent">取消</button>
            <button onclick="processCSV()" class="px-10 py-3 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition active:scale-95">更新數據</button>
        </div>
    </div>
</div>

<script>
    // --- 系統狀態 ---
    let fallCourses = [];
    let springCourses = [];
    let planningData = { '2-F': [], '2-S': [], '3-F': [], '3-S': [], '4-F': [], '4-S': [] };
    let waivedSubjects = []; 
    let currentSem = '2-F';
    let searchSem = 'F';

    const semesterNames = { '2-F': '大二上學期', '2-S': '大二下學期', '3-F': '大三上學期', '3-S': '大三下學期', '4-F': '大四上學期', '4-S': '大四下學期' };
    const yearColorMap = {
        1: { bg: 'bg-emerald-500', border: 'border-emerald-600' },
        2: { bg: 'bg-blue-500', border: 'border-blue-600' },
        3: { bg: 'bg-amber-500', border: 'border-amber-600' },
        4: { bg: 'bg-purple-500', border: 'border-purple-600' },
        0: { bg: 'bg-slate-400', border: 'border-slate-500' }
    };

    // --- 初始化：自動 fetch 資料夾檔案 ---
    async function init() {
        renderSemesterSelectors();
        switchSemester('2-F');
        loadFromStorage();
        updateModalUI();

        // 如果 LocalStorage 沒資料才自動抓取檔案 (或者每次都抓最新)
        if (fallCourses.length === 0 || springCourses.length === 0) {
            await fetchInitialCSV();
        }
    }

    async function fetchInitialCSV() {
        try {
            // Fetch 1.csv (上學期)
            const response1 = await fetch('1.csv');
            const csv1 = await response1.text();
            Papa.parse(csv1, { header: true, skipEmptyLines: true, complete: (res) => { fallCourses = res.data; filterCourses(); } });

            // Fetch 2.csv (下學期)
            const response2 = await fetch('2.csv');
            const csv2 = await response2.text();
            Papa.parse(csv2, { header: true, skipEmptyLines: true, complete: (res) => { springCourses = res.data; filterCourses(); } });
            
            console.log("CSV 檔案自動載入成功");
        } catch (error) {
            console.error("無法自動載入 CSV 檔案，請檢查檔案是否存在於目錄中。", error);
        }
    }

    // --- 其餘邏輯保持不變 ---
    function getCourseYear(course) {
        if (!course) return 0;
        const info = (course['分發條件'] || '') + (course['課程名稱'] || '');
        if (info.includes('年級:限一年級') || info.includes('大一')) return 1;
        if (info.includes('年級:限二年級') || info.includes('大二')) return 2;
        if (info.includes('年級:限三年級') || info.includes('大三')) return 3;
        if (info.includes('年級:限四年級') || info.includes('大四')) return 4;
        return 0;
    }

    function renderSemesterSelectors() {
        const container = document.getElementById('semester-selector');
        container.innerHTML = '';
        Object.entries(semesterNames).forEach(([id, name]) => {
            const btn = document.createElement('button');
            btn.innerText = name;
            btn.className = `px-6 py-3 rounded-2xl text-sm font-black transition-all border-none cursor-pointer ${currentSem === id ? 'bg-indigo-600 text-white shadow-xl scale-105 shadow-indigo-200' : 'bg-white border border-slate-100 text-slate-400 hover:bg-slate-50'}`;
            btn.onclick = () => switchSemester(id);
            container.appendChild(btn);
        });
    }

    function switchSemester(id) {
        currentSem = id;
        const semType = id.split('-')[1];
        setSearchSemester(semType, false); 
        document.getElementById('current-semester-title').innerText = semesterNames[id];
        const tag = document.getElementById('sem-type-tag');
        tag.innerText = semType === 'F' ? '搜尋上學期開課' : '搜尋下學期開課';
        tag.className = `text-[10px] px-2 py-0.5 rounded font-black tracking-widest ${semType === 'F' ? 'bg-orange-100 text-orange-600' : 'bg-teal-100 text-teal-600'}`;
        renderSemesterSelectors();
        updateDisplay();
        filterCourses();
    }

    function setSearchSemester(type, triggerSearch = true) {
        searchSem = type;
        const fBtn = document.getElementById('search-fall-btn');
        const sBtn = document.getElementById('search-spring-btn');
        fBtn.className = type === 'F' ? "flex-1 py-2 text-xs font-black rounded-lg bg-white text-indigo-600 shadow-sm border-none cursor-pointer" : "flex-1 py-2 text-xs font-black rounded-lg text-slate-400 border-none bg-transparent cursor-pointer";
        sBtn.className = type === 'S' ? "flex-1 py-2 text-xs font-black rounded-lg bg-white text-indigo-600 shadow-sm border-none cursor-pointer" : "flex-1 py-2 text-xs font-black rounded-lg text-slate-400 border-none bg-transparent cursor-pointer";
        if(triggerSearch) filterCourses();
    }

    function filterCourses() {
        const query = document.getElementById('course-search').value.toLowerCase();
        const targetDb = searchSem === 'F' ? fallCourses : springCourses;
        if (!targetDb || targetDb.length === 0) return;

        const waivedNames = new Set(waivedSubjects.map(s => s.name));
        const selectedIds = new Set(planningData[currentSem].map(c => c['流水號']));
        
        let filtered = targetDb.filter(c => {
            const name = c['課程名稱'] || "";
            const isMatch = name.toLowerCase().includes(query) ||
                            (c['流水號'] && c['流水號'].toLowerCase().includes(query)) ||
                            (c['授課教師'] && c['授課教師'].toLowerCase().includes(query)) ||
                            (c['開課系所'] && c['開課系所'].toLowerCase().includes(query));
            return isMatch && !waivedNames.has(name);
        });

        filtered.sort((a, b) => {
            const ya = getCourseYear(a) || 99;
            const yb = getCourseYear(b) || 99;
            if (ya !== yb) return ya - yb;
            const catA = a['選別'] === '必修' ? 0 : 1;
            const catB = b['選別'] === '必修' ? 0 : 1;
            if (catA !== catB) return catA - catB;
            return (a['課程名稱'] || "").localeCompare(b['課程名稱'] || "", 'zh-Hant');
        });

        const results = filtered.slice(0, 80);
        document.getElementById('search-info').innerText = query ? `篩選出 ${filtered.length} 門` : `總庫 ${targetDb.length} 門`;

        const container = document.getElementById('course-results');
        container.innerHTML = '';

        results.forEach(c => {
            const year = getCourseYear(c);
            const colors = yearColorMap[year];
            const isSelected = selectedIds.has(c['流水號']);
            const isReq = c['選別'] === '必修';
            
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl transition-all border-2 ${isSelected ? 'card-selected' : 'bg-white border-slate-100 hover:border-slate-300'}`;
            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[9px] font-black px-2 py-0.5 rounded ${isReq ? 'bg-red-500 text-white shadow-sm' : 'bg-slate-50 text-slate-400'}">${c['選別']}</span>
                    <span class="text-[9px] font-black px-2 py-0.5 rounded ${colors.bg} text-white shadow-sm">大${year || '?'}</span>
                </div>
                <h4 class="font-black text-slate-800 text-sm leading-tight flex items-center gap-2">
                    ${isSelected ? '<span class="text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
                    ${c['課程名稱']}
                </h4>
                <p class="text-[10px] text-slate-400 mt-1 font-medium truncate">${c['開課系所']} | ${c['授課教師']}</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-[10px] font-black text-indigo-500">${c['時間/教室'] || '未定'}</span>
                    ${isSelected ? 
                        `<button onclick="removeCourse('${c['流水號']}')" class="px-4 py-1.5 text-[10px] bg-indigo-100 text-indigo-600 rounded-lg font-black border-none cursor-pointer hover:bg-red-500 hover:text-white transition">已在課表</button>` : 
                        `<button onclick="addCourse('${c['流水號']}')" class="px-4 py-1.5 text-[10px] ${colors.bg} text-white rounded-lg font-black border-none cursor-pointer hover:shadow-lg transition active:scale-95 shadow-md shadow-slate-100">加入規劃</button>`
                    }
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- 其他所有原本的 JavaScript 函式 (addCourse, updateDisplay, saveToStorage 等) 保持不變 ---
    function parseTime(timeStr) {
        if(!timeStr || timeStr === "無") return [];
        const slots = [];
        const dayMap = { 'Mon': 0, 'Tue': 1, 'Wed': 2, 'Thu': 3, 'Fri': 4 };
        timeStr.split(' ').forEach(part => {
            const match = part.match(/(Mon|Tue|Wed|Thu|Fri)([0-9A-Za-z]+)/);
            if(match) {
                const day = dayMap[match[1]];
                if(day !== undefined) match[2].split('').forEach(p => slots.push({ day, period: p }));
            }
        });
        return slots;
    }

    function addCourse(id) {
        const targetDb = searchSem === 'F' ? fallCourses : springCourses;
        const course = targetDb.find(c => c['流水號'] === id);
        if(!course) return;
        planningData[currentSem].push(course);
        saveToStorage();
        updateDisplay();
        filterCourses();
    }

    function removeCourse(id) {
        planningData[currentSem] = planningData[currentSem].filter(c => c['流水號'] !== id);
        saveToStorage();
        updateDisplay();
        filterCourses();
    }

    function updateDisplay() {
        const currentCourses = planningData[currentSem];
        const periods = ['1','2','3','4','Z','5','6','7','8','9','A','B','C','D'];
        
        for(let d=0; d<5; d++) {
            periods.forEach(p => {
                const slot = document.getElementById(`slot-${d}-${p}`);
                if(slot) { slot.innerHTML = ''; slot.className = 'time-slot'; }
            });
        }

        let planningTotal = 0;
        const gridContent = {};

        currentCourses.forEach(c => {
            planningTotal += parseFloat(c['學分']) || 0;
            parseTime(c['時間/教室']).forEach(s => {
                const key = `${s.day}-${s.period}`;
                if(!gridContent[key]) gridContent[key] = [];
                gridContent[key].push(c);
            });
        });

        Object.keys(gridContent).forEach(key => {
            const slotEl = document.getElementById(`slot-${key}`);
            const courses = gridContent[key];
            if(slotEl) {
                if(courses.length > 1) {
                    slotEl.classList.add('is-conflict');
                    const badge = document.createElement('div');
                    badge.className = 'conflict-tag'; badge.innerText = '衝堂';
                    slotEl.appendChild(badge);
                }
                courses.forEach(c => {
                    const block = document.createElement('div');
                    const colors = yearColorMap[getCourseYear(c)];
                    block.className = `course-block ${colors.bg} text-white shadow-md`;
                    block.style.fontSize = courses.length > 2 ? '7px' : '9px';
                    block.innerHTML = `<span class="truncate px-1 font-black uppercase tracking-tighter">${c['課程名稱']}</span>`;
                    slotEl.appendChild(block);
                });
            }
        });

        const creditedTotal = waivedSubjects.reduce((sum, s) => sum + s.credits, 0);
        document.getElementById('total-credits').innerText = planningTotal;
        document.getElementById('credited-credits-stats').innerText = creditedTotal;
        document.getElementById('overall-total').innerText = planningTotal + creditedTotal;

        const listContainer = document.getElementById('semester-course-list');
        listContainer.innerHTML = '';
        currentCourses.forEach(c => {
            const colors = yearColorMap[getCourseYear(c)];
            const item = document.createElement('div');
            item.className = "flex items-center justify-between p-5 bg-white rounded-3xl shadow-sm border border-slate-100";
            item.innerHTML = `<div><p class="text-sm font-black text-slate-800">${c['課程名稱']}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${c['學分']}學分 | ${c['選別']}</p></div><button onclick="removeCourse('${c['流水號']}')" class="text-slate-200 hover:text-red-500 p-2 border-none bg-transparent cursor-pointer transition"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`;
            listContainer.appendChild(item);
        });
    }

    // 抵免相關彈窗函式與其他略... 
    function openCreditModal() { document.getElementById('credit-modal').classList.remove('hidden'); renderFullSubjectMenu(); renderWaivedList(); }
    function closeCreditModal() { document.getElementById('credit-modal').classList.add('hidden'); filterCourses(); updateDisplay(); }
    function openImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
    function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }

    function processCSV() {
        const input = document.getElementById('csv-input').value;
        const semType = document.querySelector('input[name="import-sem"]:checked').value;
        if(!input) return;
        Papa.parse(input, {
            header: true, skipEmptyLines: true,
            complete: function(results) {
                if(semType === 'F') fallCourses = results.data;
                else springCourses = results.data;
                closeImportModal();
                saveToStorage();
                filterCourses();
            }
        });
    }

    function saveToStorage() { localStorage.setItem('transfer_planner_v12', JSON.stringify({fallCourses, springCourses, planningData, waivedSubjects})); }
    function loadFromStorage() {
        const saved = localStorage.getItem('transfer_planner_v12');
        if(saved) {
            const parsed = JSON.parse(saved);
            fallCourses = parsed.fallCourses || [];
            springCourses = parsed.springCourses || [];
            planningData = parsed.planningData || planningData;
            waivedSubjects = parsed.waivedSubjects || [];
            filterCourses();
            updateDisplay();
        }
    }

    window.onload = init;
</script>
</body>
</html>
