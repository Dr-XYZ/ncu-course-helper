<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCU 智慧選課模擬</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CSS Variables & Global Resets
           ========================================= */
        :root {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-header: rgba(15, 23, 42, 0.95);
            --border-light: #f1f5f9;
            --border-medium: #e2e8f0;
            --border-hover: #cbd5e1;
            
            /* Typography Colors */
            --text-main: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --text-on-header: #f8fafc;

            /* Brand Accent & Functional Colors */
            --accent: #3b82f6;       /* Indigo Blue */
            --accent-hover: #2563eb;
            --accent-light: #eff6ff;
            --danger: #ef4444;       /* Rose Red */
            --danger-hover: #dc2626;
            --danger-light: #fef2f2;
            --success: #10b981;      /* Emerald Green */
            --success-hover: #059669;
            --success-light: #ecfdf5;
            --warning: #f59e0b;      /* Warm Amber */
            --warning-hover: #d97706;
            --warning-light: #fef3c7;
            --wish: #8b5cf6;         /* Orchid Purple */
            --wish-hover: #7c3aed;
            --wish-light: #f5f3ff;
            
            /* Visual Effects */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.05), 0 4px 6px -4px rgba(15, 23, 42, 0.05);
            --shadow-premium: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Outfit', 'Noto Sans TC', "Microsoft JhengHei", "Segoe UI", sans-serif; 
            margin: 0; 
            background: var(--bg-base); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* =========================================
           2. Header Styling (Glassmorphism)
           ========================================= */
        header { 
            background: var(--bg-header); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text-on-header); 
            padding: 14px 28px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-md); 
            z-index: 100; 
            flex-shrink: 0; 
        }
        
        h1 { 
            margin: 0; 
            font-size: 22px; 
            font-weight: 700;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            letter-spacing: 0.5px; 
        }
        
        .status-badge { 
            font-size: 11px; 
            padding: 4px 12px; 
            border-radius: 9999px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 500; 
            display: inline-flex;
            align-items: center;
            letter-spacing: 0.5px;
            transition: var(--transition-fast);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .header-controls button { 
            padding: 8px 16px; 
            cursor: pointer; 
            border: 1px solid transparent; 
            border-radius: var(--radius-sm); 
            font-weight: 600; 
            font-size: 13px; 
            transition: var(--transition-fast); 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-refresh { 
            background: rgba(245, 158, 11, 0.15); 
            color: var(--warning); 
            border: 1px solid rgba(245, 158, 11, 0.25) !important;
        }
        .btn-refresh:hover { 
            background: var(--warning);
            color: #1e1b4b;
            transform: translateY(-1px);
        }
        
        .btn-download { 
            background: var(--accent); 
            color: white; 
        }
        .btn-download:hover { 
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn-clear { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
        }
        .btn-clear:hover { 
            background: var(--danger); 
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        /* =========================================
           3. Layout & Sidebar
           ========================================= */
        .main-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
        }
        
        .sidebar { 
            width: 380px; 
            background: var(--bg-surface); 
            border-right: 1px solid var(--border-medium); 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
            box-shadow: 4px 0 20px rgba(15, 23, 42, 0.02); 
            flex-shrink: 0; 
            resize: horizontal; 
            overflow: hidden; 
            min-width: 330px; 
            max-width: 500px; 
            transition: width 0.1s;
        }

        /* 個人設定卡片化 */
        .profile-section { 
            padding: 0; 
            background: #fafbfc; 
            border-bottom: 1px solid var(--border-medium); 
        }
        
        .profile-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            padding: 14px 20px; 
            background: var(--bg-surface); 
            border-bottom: 1px solid var(--border-light); 
            transition: var(--transition-fast); 
        }
        .profile-header:hover { 
            background: #f8fafc; 
        }
        
        .profile-title { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
            border-left: 4px solid var(--accent); 
            padding-left: 10px; 
            margin: 0; 
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }
        
        .profile-info-summary { 
            font-size: 12px; 
            color: var(--text-muted); 
            font-weight: 500; 
            margin-left: 8px;
        }
        
        .toggle-icon { 
            transition: var(--transition-smooth); 
            font-size: 11px; 
            color: var(--text-secondary); 
        }
        .profile-section.collapsed .toggle-icon { 
            transform: rotate(-90deg); 
        }
        .profile-section.collapsed .profile-content { 
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            pointer-events: none;
        }
        
        .profile-content { 
            padding: 20px; 
            max-height: 500px;
            overflow-y: auto;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .form-group { 
            margin-bottom: 12px; 
            flex: 1; 
        }
        
        .form-group label { 
            display: block; 
            font-size: 11px; 
            color: var(--text-secondary); 
            margin-bottom: 4px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .form-group select, 
        .form-group input { 
            width: 100%; 
            padding: 8px 12px; 
            border: 1.5px solid var(--border-medium); 
            border-radius: var(--radius-sm); 
            font-size: 13px; 
            font-weight: 500;
            color: var(--text-main);
            box-sizing: border-box; 
            background: var(--bg-surface); 
            transition: var(--transition-fast);
            outline: none;
        }
        .form-group select:focus, 
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }
        
        .multi-select-box { 
            border: 1.5px solid var(--border-medium); 
            border-radius: var(--radius-sm); 
            padding: 8px 12px; 
            height: 90px; 
            overflow-y: auto; 
            background: var(--bg-surface); 
            transition: var(--transition-fast);
        }
        .multi-select-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }
        
        .checkbox-item { 
            display: flex; 
            align-items: center; 
            padding: 4px 6px; 
            cursor: pointer; 
            border-radius: 4px;
            transition: var(--transition-fast);
        }
        .checkbox-item:hover { 
            background: #f1f5f9; 
        }
        .checkbox-item input { 
            margin: 0 8px 0 2px; 
            width: 14px; 
            height: 14px;
            cursor: pointer; 
            accent-color: var(--accent);
        }
        .checkbox-item span { 
            font-size: 12px; 
            font-weight: 500;
            color: var(--text-secondary); 
            user-select: none; 
        }

        .row { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn-autofill { 
            width: 100%; 
            background: var(--accent); 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 13px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-fast); 
            margin-top: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 6px; 
        }
        .btn-autofill:hover { 
            background: var(--accent-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        /* Tabs with Underline Effect */
        .tabs { 
            display: flex; 
            border-bottom: 1px solid var(--border-medium); 
            background: #fafbfc; 
            flex-shrink: 0; 
        }
        
        .tab { 
            flex: 1; 
            text-align: center; 
            padding: 14px 4px; 
            cursor: pointer; 
            font-size: 13px; 
            color: var(--text-secondary); 
            transition: var(--transition-fast); 
            border-bottom: 2px solid transparent; 
            font-weight: 700; 
            white-space: nowrap; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .tab:hover { 
            background: #f1f5f9; 
            color: var(--text-main);
        }
        .tab.active { 
            background: var(--bg-surface); 
            border-bottom: 3px solid var(--accent); 
            color: var(--accent); 
        }
        
        .tab-count { 
            background: #e2e8f0; 
            font-size: 10px; 
            font-family: 'Outfit', sans-serif;
            padding: 2px 6px; 
            border-radius: 999px; 
            color: var(--text-secondary); 
            font-weight: 700;
        }
        .tab.active .tab-count { 
            background: var(--accent-light); 
            color: var(--accent); 
        }

        /* Search & Chips */
        .search-box { 
            padding: 14px 16px; 
            border-bottom: 1px solid var(--border-light); 
            background: var(--bg-surface);
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-box input { 
            width: 100%; 
            padding: 10px 36px 10px 36px; 
            border: 1.5px solid var(--border-medium); 
            border-radius: 9999px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            transition: var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12), var(--shadow-sm);
        }
        
        .filter-chips { 
            display: flex; 
            gap: 8px; 
            padding: 8px 16px 14px 16px; 
            border-bottom: 1px solid var(--border-light); 
            background: var(--bg-surface); 
            overflow-x: auto; 
            white-space: nowrap; 
        }
        
        .chip { 
            padding: 6px 14px; 
            border-radius: 9999px; 
            font-size: 12px; 
            font-weight: 600;
            background: var(--bg-base); 
            color: var(--text-secondary); 
            cursor: pointer; 
            border: 1px solid var(--border-medium); 
            transition: var(--transition-fast); 
            user-select: none; 
            display: inline-flex;
            align-items: center;
        }
        .chip:hover { 
            background: #e2e8f0; 
            color: var(--text-main);
        }
        .chip.active { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent);
            font-weight: 700; 
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); 
        }
        .chip[data-type="dept_required"].active { 
            background: var(--danger); 
            border-color: var(--danger);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); 
        }
        .chip[data-type="common_required"].active { 
            background: var(--wish); 
            border-color: var(--wish);
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.2); 
        }
        .chip[data-type="dept_elective"].active { 
            background: var(--warning); 
            border-color: var(--warning);
            color: white;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.25); 
        }
        .chip[data-type="other_elective"].active { 
            background: var(--accent); 
            border-color: var(--accent);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); 
        }
        .chip[data-type="general"].active { 
            background: var(--success); 
            border-color: var(--success);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); 
        }
        .chip[data-type="others"].active { 
            background: var(--text-secondary); 
            border-color: var(--text-secondary);
            box-shadow: 0 4px 10px rgba(71, 85, 105, 0.2); 
        }

        .chip-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            transition: var(--transition-fast);
        }
        .chip.active .chip-dot {
            background: white !important;
        }

        /* Course List Card Design */
        .course-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 16px; 
            list-style: none; 
            margin: 0; 
            background: #fafbfc; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .course-item { 
            background: var(--bg-surface);
            padding: 14px 16px; 
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-medium); 
            cursor: pointer; 
            transition: var(--transition-smooth); 
            position: relative; 
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0; /* 防止被 flex 容器壓縮 */
        }
        .course-item:hover { 
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }
        
        .course-item.added { 
            background: var(--success-light); 
            border-color: rgba(16, 185, 129, 0.2); 
        }
        .course-item.added::after { 
            content: "✓"; 
            position: absolute; 
            right: 18px; 
            top: 14px; 
            font-size: 18px; 
            color: var(--success); 
            font-weight: 800; 
        }
        .course-item.added:hover {
            border-color: var(--success);
        }
        
        .course-item.conflict-item { 
            opacity: 0.85; 
            background: var(--danger-light); 
            border-color: rgba(239, 68, 68, 0.15); 
        }
        .course-item.conflict-item:hover {
            border-color: var(--danger);
        }
        
        .tag { 
            font-size: 9px; 
            padding: 2px 8px; 
            border-radius: 4px; 
            color: white; 
            margin-left: 6px; 
            font-weight: 700; 
            vertical-align: middle; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .tag.req { background: var(--danger); }
        .tag.elec { background: var(--accent); }
        .tag.gen { background: var(--warning); color: white; }
        .tag.pri { background: var(--text-secondary); }
        
        .c-name { 
            font-weight: 700; 
            color: var(--text-main); 
            font-size: 14px; 
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 6px; 
            line-height: 1.4;
        }
        .c-name-text {
            line-height: 1.4;
            display: inline-block;
            vertical-align: middle;
        }
        
        .c-info { 
            font-size: 12px; 
            color: var(--text-secondary); 
            font-weight: 500;
            margin-top: 3px;
        }
        .btn-wish { display: none; } 

        /* =========================================
           4. Timetable Grid Area
           ========================================= */
        .content { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            background: var(--bg-base); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .timetable-container { 
            background: var(--bg-surface); 
            padding: 24px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-premium); 
            border: 1px solid var(--border-light);
            width: 100%; 
            max-width: 1100px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
        }
        
        .timetable-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            align-items: center; 
            border-bottom: 1.5px solid var(--border-light); 
            padding-bottom: 14px; 
        }
        .timetable-header span {
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }
        
        .credits-info { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-secondary); 
            background: var(--bg-base);
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid var(--border-medium);
            display: inline-flex;
            align-items: center;
        }
        
        .credits-num { 
            color: var(--accent); 
            font-size: 18px; 
            font-weight: 700;
            margin-left: 6px; 
            font-family: 'Outfit', sans-serif;
        }
        
        .timetable { 
            display: grid; 
            grid-template-columns: 60px repeat(7, 1fr); 
            grid-auto-rows: minmax(58px, auto); 
            border: 1.5px solid var(--border-medium); 
            background: var(--border-medium); 
            border-radius: var(--radius-md);
            gap: 1px; 
            position: relative; 
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .cell { 
            background: var(--bg-surface); 
            min-height: 58px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            font-weight: 500;
            padding: 4px; 
            text-align: center; 
            color: var(--text-secondary); 
        }
        
        .cell.header-row { 
            background: #fafbfc; 
            font-weight: 700; 
            color: var(--text-main); 
            height: 48px; 
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        
        .cell.period-col { 
            background: #fafbfc; 
            font-weight: 700; 
            color: var(--text-main); 
            flex-direction: column; 
            font-family: 'Outfit', 'Consolas', sans-serif; 
            font-size: 13px;
        }

        /* Premium Course Blocks */
        .course-block { 
            width: 100%; 
            height: 100%; 
            background: var(--accent); 
            color: white; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08); 
            z-index: 5; 
            padding: 6px; 
            box-sizing: border-box; 
            text-align: center; 
            overflow: hidden; 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, filter 0.15s; 
            border-radius: 6px; 
            text-shadow: none; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }
        
        .course-block:hover { 
            transform: scale(1.05); 
            z-index: 20; 
            box-shadow: 0 12px 20px -5px rgba(15, 23, 42, 0.25); 
            filter: brightness(1.05);
        }
        
        .course-block .cb-name { 
            font-weight: 700; 
            line-height: 1.3; 
            margin-bottom: 3px; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            font-size: 11.5px;
            letter-spacing: 0.2px;
        }
        
        .course-block .cb-room { 
            font-size: 9px; 
            opacity: 0.9; 
            font-weight: 500;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 100%; 
            background: rgba(0, 0, 0, 0.08);
            padding: 1px 6px;
            border-radius: 4px;
            margin-top: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .course-block.pending { 
            background: var(--warning-light) !important; 
            animation: pulse 2.5s infinite; 
            border: 2px dashed rgba(245, 158, 11, 0.5); 
            text-shadow: none; 
            color: var(--warning-hover); 
            box-shadow: var(--shadow-sm);
        }
        .course-block.pending:hover {
            color: #78350f;
            border-color: var(--warning);
        }
        
        .course-block.wish-mode { 
            background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9) 10px, rgba(241, 245, 249, 0.9) 10px, rgba(241, 245, 249, 0.9) 20px); 
            border: 2px dashed var(--border-hover); 
            color: var(--text-secondary); 
            z-index: 4; 
            opacity: 0.95; 
            text-shadow: none; 
            box-shadow: var(--shadow-sm);
        }
        .course-block.wish-mode:hover { 
            z-index: 25; 
            background: var(--wish-light); 
            border-color: var(--wish); 
            color: var(--wish-hover);
        }

        /* [EDITED] EXPORT MODE: Adjusted for ~1720px width (Sun-Sat Layout) */
        .timetable-container.export-mode {
            width: 860px !important; 
            min-width: 860px !important;
            max-width: 860px !important;
            padding: 40px 30px !important; 
            border-radius: 0 !important;
            box-shadow: none !important;
            background: white !important;
            margin: 0 auto !important;
        }

        /* =========================================
           5. Mobile & Responsive Design
           ========================================= */
        @media (max-width: 768px) {
            body { height: auto; overflow: auto; } 
            .main-container { flex-direction: column; height: auto; overflow: visible; }

            .sidebar { 
                width: 100%; 
                max-width: 100%;
                height: 55vh; 
                resize: none; 
                border-right: none;
                border-bottom: 1.5px solid var(--border-medium);
            }

            .content { padding: 12px; overflow-x: hidden; }
            .timetable-container { 
                padding: 12px; 
                width: 100%; 
                overflow-x: hidden; 
                border-radius: var(--radius-md);
            }
            .timetable { 
                grid-template-columns: 35px repeat(7, 1fr); 
                grid-auto-rows: minmax(48px, auto); 
            }
            .cell { font-size: 10px; min-height: 48px; }
            .cell.period-col { font-size: 11px; }

            h1 { font-size: 17px; }
            .header-controls button { padding: 6px 10px; font-size: 12px; }

            .modal-box { width: 92%; max-width: 92%; padding: 20px; }

            .course-block { font-size: 9px; padding: 2px; }
            .course-block .cb-name { font-size: 9.5px; -webkit-line-clamp: 3; }
            .course-block .cb-room { font-size: 7.5px; padding: 0px 3px; }
        }

        /* =========================================
           6. Modals (Blur Backdrops & Slide-In Animation)
           ========================================= */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            animation: fadeIn 0.25s ease-out;
        }
        
        .modal-box { 
            background: var(--bg-surface); 
            width: 500px; 
            max-width: 90%; 
            border-radius: var(--radius-lg); 
            padding: 28px; 
            box-shadow: var(--shadow-premium); 
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex; 
            flex-direction: column; 
            max-height: 85vh; 
            animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal-title { 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            color: var(--text-main); 
            border-bottom: 2.5px solid var(--border-light); 
            padding-bottom: 12px; 
            letter-spacing: 0.5px;
        }
        
        .modal-body { 
            overflow-y: auto; 
            flex: 1; 
            padding-right: 6px; 
        }
        
        .detail-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13.5px; 
            margin-bottom: 20px; 
        }
        
        .detail-table td { 
            padding: 10px 12px; 
            border-bottom: 1px solid var(--border-light); 
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .detail-table td.label { 
            width: 110px; 
            font-weight: 700; 
            color: var(--text-main); 
            background: #fafbfc; 
            border-right: 1px solid var(--border-light);
            letter-spacing: 0.5px;
        }
        
        .modal-actions { 
            display: flex; 
            gap: 10px; 
            justify-content: flex-end; 
            margin-top: 20px; 
        }
        
        .btn-action { 
            padding: 10px 20px; 
            border: 1px solid transparent; 
            border-radius: var(--radius-sm); 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 13.5px; 
            transition: var(--transition-fast); 
            box-shadow: var(--shadow-sm);
        }
        
        .btn-close { 
            background: var(--bg-base); 
            color: var(--text-secondary); 
            border-color: var(--border-medium);
        }
        .btn-close:hover { 
            background: #e2e8f0; 
            color: var(--text-main);
        }
        
        .btn-add { 
            background: var(--success); 
            color: white; 
        }
        .btn-add:hover { 
            background: var(--success-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }
        
        .btn-wishlist { 
            background: var(--wish); 
            color: white; 
        }
        .btn-wishlist:hover { 
            background: var(--wish-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.2);
        }
        
        .btn-remove { 
            background: var(--danger); 
            color: white; 
        }
        .btn-remove:hover { 
            background: var(--danger-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }

        /* Choice Selectors */
        .choice-list { 
            max-height: 280px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .choice-item { 
            padding: 14px 16px; 
            border: 1.5px solid var(--border-medium); 
            background: var(--bg-surface);
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            transition: var(--transition-smooth); 
            box-shadow: var(--shadow-sm);
        }
        .choice-item:hover { 
            background: var(--accent-light); 
            border-color: var(--accent); 
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .close-modal {
            width: 100%;
            background: var(--bg-base);
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            padding: 10px;
            font-weight: 700;
            font-size: 13.5px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
            margin-top: 14px;
        }
        .close-modal:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        /* Float Notifications */
        #notification { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--bg-header); 
            backdrop-filter: blur(8px);
            color: white; 
            padding: 14px 28px; 
            border-radius: var(--radius-md); 
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; 
            z-index: 999; 
            transform: translateY(20px) scale(0.9); 
            font-weight: 700; 
            font-size: 13.5px;
            letter-spacing: 0.5px;
        }
        #notification.show { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
        }
        
        /* Blur Loading Overlay */
        #loadingOverlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(248, 250, 252, 0.95); 
            backdrop-filter: blur(10px);
            z-index: 999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        .spinner { 
            border: 3.5px solid var(--border-medium); 
            border-top: 3.5px solid var(--accent); 
            border-radius: 50%; 
            width: 44px; 
            height: 44px; 
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite; 
            margin-bottom: 16px; 
            box-shadow: var(--shadow-sm);
        }

        /* Animations */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* =========================================
           7. Custom Confirm Dialog
           ========================================= */
        #confirmModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }
        #confirmModal.show { display: flex; }
        .confirm-box {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 32px 28px 24px;
            width: 380px;
            max-width: 92%;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255,255,255,0.6);
            animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }
        .confirm-icon { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            background: var(--warning-light); 
            color: var(--warning-hover); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: 700; 
            margin: 0 auto 16px; 
            border: 1.5px solid rgba(245, 158, 11, 0.25);
        }

    </style>
</head>

<body>

    <div id="loadingOverlay">

    <div class="main-container">
        <div class="sidebar">
            <div class="profile-section" id="profileSection">
                <div class="profile-header" onclick="toggleProfile()">
                    <div class="profile-title">
                        個人身分設定 <span id="profileSummary" class="profile-info-summary"></span>
                    </div>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="profile-content">
                    <div class="row">
                        <div class="form-group"><label>學制</label><select id="userSystem" onchange="saveAndRefresh()"><option value="學士班">學士班</option><option value="碩士班">碩士班</option><option value="博士班">博士班</option></select></div>
                        <div class="form-group"><label>學院</label><select id="userCollege" onchange="updateDeptOptions()"></select></div>
                    </div>
                    <div class="form-group"><label>系所</label><select id="userDept" onchange="saveAndRefresh()"></select></div>
                    <div class="form-group"><label>學程 / 第二專長 (可多選)</label><div id="userProgramContainer" class="multi-select-box" onchange="saveAndRefresh()"></div></div>
                    <div class="row">
                        <div class="form-group"><label>年級</label><select id="userGrade" onchange="saveAndRefresh()"><option value="1">一年級</option><option value="2">二年級</option><option value="3">三年級</option><option value="4">四年級</option></select></div>
                        <div class="form-group"><label>班級</label><select id="userClass" onchange="saveAndRefresh()"><option value="A">A班</option><option value="B">B班</option><option value="C">C班</option></select></div>
                    </div>
                    <div class="row">
                        <div class="form-group"><label>身份</label><select id="userIdentity" onchange="saveAndRefresh()"><option value="一般生">一般生</option><option value="交換生">交換生</option></select></div>
                        <div class="form-group"><label>單雙號</label><select id="userParity" onchange="saveAndRefresh()"><option value="odd">單號</option><option value="even">雙號</option></select></div>
                    </div>

            </div>

            <div class="tabs">
                <div class="tab active" onclick="setTab('available')">能選的課 <span id="count-available" class="tab-count">0</span></div>
                <div class="tab" onclick="setTab('wishlist')">待選清單 <span id="count-wishlist" class="tab-count" style="background:var(--wish); color:white;">0</span></div>
                <div class="tab" onclick="setTab('conflict')">衝堂 <span id="count-conflict" class="tab-count" style="background:var(--danger); color:white;">0</span></div>
            </div>

            <div class="search-box">
                <svg style="position: absolute; left: 28px; width: 14px; height: 14px; color: var(--text-muted); fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="搜尋課名、老師、代碼..." oninput="renderCourseList()">
                <span id="searchClearBtn" onclick="clearSearch()" style="position: absolute; right: 28px; cursor: pointer; color: var(--text-muted); font-weight: 700; display: none; font-size: 13px;">✕</span>
            </div>
            <div style="padding: 0 16px 10px 16px; background: var(--bg-surface); display: flex; align-items: center; border-bottom: 1px solid var(--border-light);">

                </div>

                </div>

            <div class="confirm-icon" id="confirmIcon">!</div>

            <div style="font-size:13.5px;color:var(--text-secondary);margin-bottom:24px;line-height:1.5;" id="confirmMessage">內容</div>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button class="btn-action btn-close" onclick="closeConfirmModal()">取消</button>
                <button class="btn-action" id="confirmOkBtn" style="color:white;">確認</button>

    <script>
        // Custom search field helper
        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            const clearBtn = document.getElementById('searchClearBtn');
            if (clearBtn) clearBtn.style.display = 'none';
            renderCourseList();
        }

        // Custom Confirm Dialog helpers
        let confirmCallback = null;
        function showConfirmModal(iconType, title, message, okLabel, okStyle, callback) {
            const icon = document.getElementById('confirmIcon');
            if (icon) {
                icon.innerText = iconType === 'danger' ? '!' : (iconType === 'warning' ? '!' : '?');
                icon.style.background = iconType === 'danger' ? 'var(--danger-light)' : 'var(--warning-light)';
                icon.style.color = iconType === 'danger' ? 'var(--danger)' : 'var(--warning-hover)';
                icon.style.borderColor = iconType === 'danger' ? 'rgba(239, 68, 68, 0.25)' : 'rgba(245, 158, 11, 0.25)';
            }
            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmMessage').innerText = message;
            const okBtn = document.getElementById('confirmOkBtn');
            okBtn.innerText = okLabel;
            okBtn.style.background = okStyle === 'danger' ? 'var(--danger)' : 'var(--accent)';
            okBtn.style.borderColor = okStyle === 'danger' ? 'var(--danger)' : 'var(--accent)';
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.add('show');
        }
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            confirmCallback = null;
        }
        window.addEventListener('DOMContentLoaded', () => {
            const okBtn = document.getElementById('confirmOkBtn');
            if (okBtn) {
                okBtn.onclick = () => {
                    if (confirmCallback) confirmCallback();
                    closeConfirmModal();
                };
            }
        });

        const PERIOD_ORDER = ['1', '2', '3', '4', 'Z', '5', '6', '7', '8', '9', 'A', 'B', 'C', 'D'];
        // [EDITED] UI Header Order: Sunday First
        const DAYS = ['日', '一', '二', '三', '四', '五', '六'];
        const NCU_STRUCTURE = { "文學院": ["中國文學系", "英美語文學系", "法國語文學系", "哲學研究所", "歷史研究所", "藝術學研究所", "學習與教學研究所", "文學院學士班"], "理學院": ["數學系", "物理學系", "化學學系", "光電科學與工程學系", "統計研究所", "天文研究所", "理學院學士班"], "工學院": ["化學工程與材料工程學系", "土木工程學系", "機械工程學系", "能源工程研究所", "環境工程研究所", "營建管理研究所", "材料科學與工程研究所", "工學院學士班"], "管理學院": ["企業管理學系", "資訊管理學系", "財務金融學系", "經濟學系", "會計研究所", "產業經濟研究所", "人力資源管理研究所", "工業管理研究所"], "資訊電機學院": ["電機工程學系", "資訊工程學系", "通訊工程學系", "網路學習科技研究所", "資訊電機學院學士班"], "地球科學學院": ["大氣科學學系", "地球科學學系", "太空科學與工程學系", "應用地質研究所", "水文與海洋科學研究所", "地球科學學院學士班"], "客家學院": ["客家語文暨社會科學學系", "法律與政府研究所"], "生醫理工學院": ["生命科學系", "生醫科學與工程學系", "認知神經科學研究所"] };
        const GENERAL_UNITS = ["體育室", "軍訓室", "學務處-服務學習發展中心", "通識教育中心", "語言中心", "總教學中心", "學務處-職涯發展中心", "遙測科技碩士學位學程", "環境科技博士學位學程(台灣聯合大學系統)"];
        const GRADE_MAP_REV = { '1': '一年級', '2': '二年級', '3': '三年級', '4': '四年級' };

        // [Updated] Morandi Color Palette for Course Blocks Only
        const MORANDI_PALETTE = [
            '#7B8D8E', '#BF8A88', '#8F99A6', '#C8BCA6', '#70887D', 
            '#A88688', '#8798A5', '#D4C4B7', '#96A48B', '#B09C85', 
            '#8D99AE', '#D8A48F', '#84A98C', '#A5A58D', '#B7B7A4', 
            '#E29578', '#6D6875', '#E5989B', '#588157', '#3D405B', 
            '#6B705C', '#CB997E', '#A4AC86', '#64A6BD'
        ];

        let allCourses = [];
        let mySchedule = [];
        let myWishlist = [];
        let currentTab = 'available';
        let currentPlaceholder = null; 
        let currentFilterType = 'all'; 
        let currentDetailCourse = null;

        function toggleProfile() {
            const section = document.getElementById('profileSection');
            section.classList.toggle('collapsed');
            updateProfileSummary();
        }
        function updateProfileSummary() {
            const dept = document.getElementById('userDept').value;
            const grade = document.getElementById('userGrade').value;
            const summary = document.getElementById('profileSummary');
            const isCollapsed = document.getElementById('profileSection').classList.contains('collapsed');
            summary.innerText = isCollapsed ? `(${dept} / ${grade}年級)` : "";
        }
        function setFilter(type, element) {
            currentFilterType = type;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderCourseList(); 
        }

        // [FIX 1] Helper to determine if text should be white or black based on bg color
        function getContrastColor(hex) {
            if(!hex) return '#ffffff';
            // Convert hex to RGB
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            // YIQ equation
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 140) ? '#333333' : '#ffffff';
        }

        function checkEligibility(course, user) {
            const rules = course.rules_parsed;
            if (!rules || rules.length === 0) return { pass: true, priority: 99 };
            let passedGrp = null;
            const pass = rules.some(grp => {
                const r = grp.rules;
                const ok = Object.keys(r).every(k => {
                    if (k === 'other') {
                        const isCollegeRule = r[k].values.some(v => v.includes('學院'));
                        if (isCollegeRule) {
                            const userDept = user.dept;
                            const collegeMatch = r[k].values.some(v => {
                                const deptsInCollege = NCU_STRUCTURE[v];
                                return deptsInCollege && deptsInCollege.includes(userDept);
                            });
                            return r[k].mode === 'include' ? collegeMatch : !collegeMatch;
                        }
                        return true;
                    }
                    if (['prerequisite', 'limit'].includes(k)) return true;
                    const rule = r[k];
                    if (k === 'program') return true; 
                    let uVal = user[k] || "";
                    if (k !== 'identity' && uVal === "") return false;
                    if (k === 'parity') return rule.value === 'all' || rule.value === uVal;
                    if (k === 'dept') {
                        const userDept = user.dept;
                        const userProgs = user.program || []; 
                        const strictMatch = rule.values.some(v => userDept === v || userDept.includes(v));
                        const programMatch = userProgs.some(up => rule.values.includes(up));
                        const collegeMatch = rule.values.some(v => {
                            const deptsInCollege = NCU_STRUCTURE[v];
                            return deptsInCollege && deptsInCollege.includes(userDept);
                        });
                        const isMatch = strictMatch || programMatch || collegeMatch;
                        return rule.mode === 'include' ? isMatch : !isMatch;
                    }
                    const match = rule.values.some(v => v && (uVal.includes(v) || v.includes(uVal)));
                    return rule.mode === 'include' ? match : !match;
                });
                if (ok) passedGrp = grp;
                return ok;
            });
            return pass ? { pass: true, priority: passedGrp.priority } : { pass: false, priority: -1 };
        }

        function isTargetRequired(course, user) {
            if (!course.is_required) return false;
            const deptName = course.dept_name || "";
            if (deptName.includes("體育") || deptName.includes("通識") || deptName.includes("軍訓") || deptName.includes("語言中心") || deptName.includes("服務學習")) { }
            let isSourceMatch = false;
            if (course.sources && course.sources.length > 0) {
                const targetGradeName = GRADE_MAP_REV[user.grade];
                isSourceMatch = course.sources.some(src => (src.dept === user.dept) && (src.class === targetGradeName));
            } else { isSourceMatch = (course.dept_name === user.dept); }
            if (!isSourceMatch) return false;
            const rules = course.rules_parsed;
            if (!rules || rules.length === 0) return true;
            const p1 = rules.find(r => r.priority === 1);
            if (p1) {
                const r = p1.rules;
                let p1DeptMatch = true;
                if (r.dept) {
                    const isListed = r.dept.values.some(v => v === user.dept || (NCU_STRUCTURE[v] && NCU_STRUCTURE[v].includes(user.dept)));
                    if (r.dept.mode === 'include' && !isListed) p1DeptMatch = false;
                    if (r.dept.mode === 'exclude' && isListed) p1DeptMatch = false;
                }
                let p1GradeMatch = true;
                if (r.grade && r.grade.mode === 'include' && !r.grade.values.includes(user.grade)) p1GradeMatch = false;
                if (p1DeptMatch && p1GradeMatch) {
                    if (r.class) {
                        if (r.class.mode === 'include' && !r.class.values.includes(user.class)) return false;
                        if (r.class.mode === 'exclude' && r.class.values.includes(user.class)) return false;
                    }
                    if (r.parity) {
                        if (r.parity.value === 'odd' && user.parity !== 'odd') return false;
                        if (r.parity.value === 'even' && user.parity !== 'even') return false;
                    }
                }
            }
            const matchAny = rules.some(grp => {
                const r = grp.rules;
                if (r.dept) {
                    const isListed = r.dept.values.some(v => v === user.dept || (NCU_STRUCTURE[v] && NCU_STRUCTURE[v].includes(user.dept)));
                    if (r.dept.mode === 'include' && !isListed) return false;
                    if (r.dept.mode === 'exclude' && isListed) return false;
                }
                if (r.grade && r.grade.mode === 'include' && !r.grade.values.includes(user.grade)) return false;
                if (r.class) {
                    if (r.class.mode === 'include' && !r.class.values.includes(user.class)) return false;
                }
                if (r.parity && r.parity.value !== 'all' && r.parity.value !== user.parity) return false;
                if (r.identity) {
                    const isExchange = user.identity === '交換生';
                    if (r.identity.mode === 'exclude' && r.identity.values.includes('交換生') && isExchange) return false;
                    if (r.identity.mode === 'include' && r.identity.values.includes('交換生') && !isExchange) return false;
                }
                return true;
            });
            return matchAny;
        }

        function isMatchP1(course, user) {
            const rules = course.rules_parsed;
            if (!rules || rules.length === 0) return false;
            const p1 = rules.find(r => r.priority === 1);
            if (!p1) return false;
            const r = p1.rules;
            if (r.dept) {
                const isListed = r.dept.values.some(v => v === user.dept || (NCU_STRUCTURE[v] && NCU_STRUCTURE[v].includes(user.dept)));
                if (r.dept.mode === 'include' && !isListed) return false;
                if (r.dept.mode === 'exclude' && isListed) return false;
            }
            if (r.grade && r.grade.mode === 'include' && !r.grade.values.includes(user.grade)) return false;
            if (r.class) {
                if (r.class.mode === 'include' && !r.class.values.includes(user.class)) return false;
                if (r.class.mode === 'exclude' && r.class.values.includes(user.class)) return false;
            }
            if (r.parity) {
                if (r.parity.value === 'odd' && user.parity !== 'odd') return false;
                if (r.parity.value === 'even' && user.parity !== 'even') return false;
            }
            return true;
        }

        function getTimeSignature(course) {
            if (!course.time_parsed || course.time_parsed.length === 0) return "TBD";
            const sorted = [...course.time_parsed].sort((a, b) => a.day - b.day || a.start - b.start);
            return sorted.map(t => `${t.day}-${t.start}-${t.end}`).join('|');
        }

        function normalizeStr(str) {
            if (!str) return '';
            return str.replace(/[\uFF01-\uFF5E]/g, function(ch) {
                return String.fromCharCode(ch.charCodeAt(0) - 0xfee0);
            }).replace(/\s+/g, '').trim();
        }

        function getBaseName(name) {
            if (!name) return '';
            const norm = normalizeStr(name);
            if (norm.includes('國文') && norm.includes('經典閱讀')) {
                return '國文經典閱讀';
            }
            const idx = norm.indexOf('：');
            if (idx > 0) return norm.substring(0, idx).trim();
            const idx2 = norm.indexOf(':');
            if (idx2 > 0) return norm.substring(0, idx2).trim();
            return norm;
        }

        function autoFillRequired() {
            const user = getUserProfile();
            mySchedule = mySchedule.filter(c => !c.is_required);
            const allCandidates = allCourses.filter(c => isTargetRequired(c, user));
            
            const groups = {};
            allCandidates.forEach(c => {
                // 用「基底名」+ 時段簽名作為分組鍵
                const baseName = getBaseName(c['課程名稱']);
                const timeSig = getTimeSignature(c);
                const uniqueKey = `${baseName}::${timeSig}`;
                if (!groups[uniqueKey]) groups[uniqueKey] = [];
                groups[uniqueKey].push(c);
            });

            // 計算課程對於當前使用者的限制精確度得分，用於解決衝突時的優先順序
            const getSpecificity = (course) => {
                const rules = course.rules_parsed || [];
                let maxScore = 0;
                rules.forEach(grp => {
                    const r = grp.rules;
                    const ok = Object.keys(r).every(k => {
                        if (k === 'other') return true;
                        if (['prerequisite', 'limit', 'program'].includes(k)) return true;
                        const rule = r[k];
                        let uVal = user[k] || "";
                        if (k !== 'identity' && uVal === "") return false;
                        if (k === 'parity') return rule.value === 'all' || rule.value === uVal;
                        if (k === 'dept') {
                            const userDept = user.dept;
                            const userProgs = user.program || [];
                            const strictMatch = rule.values.some(v => userDept === v || userDept.includes(v));
                            const programMatch = userProgs.some(up => rule.values.includes(up));
                            const collegeMatch = rule.values.some(v => {
                                const deptsInCollege = NCU_STRUCTURE[v];
                                return deptsInCollege && deptsInCollege.includes(userDept);
                            });
                            const isMatch = strictMatch || programMatch || collegeMatch;
                            return rule.mode === 'include' ? isMatch : !isMatch;
                        }
                        const match = rule.values.some(v => v && (uVal.includes(v) || v.includes(uVal)));
                        return rule.mode === 'include' ? match : !match;
                    });
                    if (ok) {
                        let score = (10 - grp.priority) * 10; // priority 1 -> 90, priority 2 -> 80
                        if (r.class) score += 50;
                        if (r.parity && r.parity.value !== 'all') score += 40;
                        if (r.grade) score += 30;
                        if (score > maxScore) maxScore = score;
                    }
                });
                return maxScore;
            };

            // 將所有群組依照最大精確度由高到低排序，以優先佔用時段
            const groupList = Object.values(groups).map(candidates => {
                candidates.sort((a, b) => getSpecificity(b) - getSpecificity(a));
                const maxSpec = getSpecificity(candidates[0]);
                return { candidates, maxSpec };
            });

            groupList.sort((a, b) => b.maxSpec - a.maxSpec);

            let addedCount = 0;
            let selectionCount = 0;
            groupList.forEach(({ candidates }) => {
                if (candidates.length === 1) {
                    const c = candidates[0];
                    if (!isConflict(c, mySchedule)) {
                        mySchedule.push(c);
                        addedCount++;
                    }
                } else if (candidates.length > 1) {
                    selectionCount++;
                    const placeholder = { ...candidates[0] };
                    placeholder.is_placeholder = true;
                    placeholder.candidates = candidates;
                    placeholder['授課教師'] = "請選擇老師";
                    mySchedule.push(placeholder);
                }
            });

            saveScheduleToLocal();
            renderTimetable();
            renderCourseList();
            let msg = `已加入 ${addedCount} 門必修`;
            if (selectionCount > 0) msg += `，有 ${selectionCount} 門需選老師`;
            showNotify(msg, 'success');
        }

                }
