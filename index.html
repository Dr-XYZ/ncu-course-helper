        function isConflict(newC, list) {
            const nTs = newC.time_parsed || [];
            const otherCourses = list.filter(c => c['課程編號'] !== newC['課程編號']);
            return otherCourses.some(ex => {
                const eTs = ex.time_parsed || [];
                return nTs.some(nt => eTs.some(et =>
                    nt.day === et.day &&
                    Math.max(nt.start, et.start) <= Math.min(nt.end, et.end)
                ));
            });
        }

        function openSelectionModal(placeholder) {
            currentPlaceholder = placeholder;
            const modal = document.getElementById('selectionModal');
            const modalTitle = modal.querySelector('.modal-title');
            const list = document.getElementById('modalChoices');
            list.innerHTML = '';

            const candidates = placeholder.candidates;
            // 判斷是否為「同基底名、不同副標題」的選課情境
            const firstBase = getBaseName(candidates[0]['課程名稱']);
            const allSameBase = candidates.every(c => getBaseName(c['課程名稱']) === firstBase);

            if (allSameBase && firstBase !== normalizeStr(candidates[0]['課程名稱'])) {
                // 智慧標題顯示原有的課程首碼（例如：請選擇 國文（A）經典閱讀 的班級）
                const rawName = candidates[0]['課程名稱'];
                const titlePrefix = rawName.split(/：|:/)[0] || rawName;
                modalTitle.innerHTML = `請選擇 <span style="color:var(--accent);">${titlePrefix}</span> 的班級`;
                
                candidates.forEach(c => {
                    const normName = normalizeStr(c['課程名稱']);
                    // 使用冒號分割提取副標題
                    const parts = c['課程名稱'].split(/：|:/);
                    const subtitle = parts.length > 1 ? parts.slice(1).join('：').trim() : c['課程名稱'];
                    
                    const div = document.createElement('div');
                    div.className = 'choice-item';
                    div.innerHTML = `
                        <div style="font-weight:700;font-size:13.5px;color:var(--text-main);margin-bottom:4px;">${subtitle}</div>
                        <div style="font-size:12px;color:var(--text-secondary);">教師：${c['授課教師']}</div>
                        <div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">時間：${c['上課時間/教室']}</div>
                    `;
                    div.onclick = () => selectCandidate(c);
                    list.appendChild(div);
                });
            } else {
                // 一般選老師
                modalTitle.textContent = '請選擇一門課程 (選老師)';
                candidates.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'choice-item';
                    div.innerHTML = `<div style="font-weight:bold;">${c['授課教師']}</div><div style="font-size:12px; color:var(--text-secondary);">時間：${c['上課時間/教室']}</div>`;
                    div.onclick = () => selectCandidate(c);
                    list.appendChild(div);
                });
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('selectionModal').style.display = 'none';
            currentPlaceholder = null;
        }

                function selectCandidate(course) {
            const idx = mySchedule.indexOf(currentPlaceholder);
            if (idx > -1) mySchedule.splice(idx, 1);
            if (isConflict(course, mySchedule)) {
                showNotify("時段衝堂！無法加入該時段", "error");
                mySchedule.push(currentPlaceholder);
            } else {
                mySchedule.push(course);
                showNotify(`已選擇：${course['授課教師']}`, 'success');
            }
            closeModal();
            saveScheduleToLocal();
            renderTimetable();
            renderCourseList();
        }

        function getLayoutConfig(items) {
            items.sort((a, b) => (a.start - b.start) || ((b.end - b.start) - (a.end - a.start)));
            const columns = [];
            items.forEach(item => {
                let placed = false;
                for (let i = 0; i < columns.length; i++) {
                    if (columns[i] <= item.start) {
                        columns[i] = item.end;
                        item.colIndex = i;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    item.colIndex = columns.length;
                    columns.push(item.end);
                }
            });
            const layoutResult = new Map();
            items.forEach(item => {
                const overlapping = items.filter(other =>
                    other !== item && Math.max(item.start, other.start) < Math.min(item.end, other.end)
                );
                let groupMaxCol = item.colIndex;
                overlapping.forEach(o => { if (o.colIndex > groupMaxCol) groupMaxCol = o.colIndex; });
                const totalCols = groupMaxCol + 1;
                const widthPct = 100 / totalCols;
                const leftPct = item.colIndex * widthPct;
                layoutResult.set(item.id, { width: `calc(${widthPct}% - 2px)`, marginLeft: `${leftPct}%` });
            });
            return layoutResult;
        }

        // [EDITED] Render with Sunday-First Logic
        function renderTimetable() {
            document.querySelectorAll('.course-block').forEach(e => e.remove());
            initGridHTML();

            const grid = document.getElementById('timetableGrid');
            let total = 0;
            const allRenderItems = [];

            // Color Mapping Setup
            const uniqueIDs = new Set();
            mySchedule.forEach(c => uniqueIDs.add(c['課程編號']));
            myWishlist.forEach(c => uniqueIDs.add(c['課程編號']));
            const colorMap = {};
            let colorIdx = 0;
            uniqueIDs.forEach(id => {
                colorMap[id] = MORANDI_PALETTE[colorIdx % MORANDI_PALETTE.length];
                colorIdx++;
            });

            // Collect Items (Data is 0=Mon, ... 6=Sun)
            myWishlist.forEach((c, idx) => {
                if (mySchedule.some(s => s['課程編號'] === c['課程編號'])) return;
                (c.time_parsed || []).forEach((t, tIdx) => {
                    allRenderItems.push({ id: `w-${c['課程編號']}-${tIdx}`, course: c, day: t.day, start: t.start, end: t.end, type: 'wish' });
                });
            });

            mySchedule.forEach((c, idx) => {
                total += parseFloat(c['學分']) || 0;
                (c.time_parsed || []).forEach((t, tIdx) => {
                    allRenderItems.push({ id: `o-${c['課程編號']}-${tIdx}`, course: c, day: t.day, start: t.start, end: t.end, type: 'official' });
                });
            });

            // Loop through DATA days (0=Mon ... 6=Sun)
            for (let d = 0; d < 7; d++) {
                const dayItems = allRenderItems.filter(i => i.day === d);
                if (dayItems.length === 0) continue;

                const layoutConfig = getLayoutConfig(dayItems);
                
                dayItems.forEach(item => {
                    const c = item.course;
                    const div = document.createElement('div');
                    const style = layoutConfig.get(item.id);
                    const visualDayIndex = (item.day + 1) % 7;

                    // Desktop Grid Logic (original) - now used for all sizes
                    const col = visualDayIndex + 2;
                    const rowStart = item.start + 2;
                    const rowEnd = item.end + 3;
                    div.style.gridColumn = `${col} / ${col + 1}`;
                    div.style.gridRow = `${rowStart} / ${rowEnd}`;
                    div.style.width = style.width;
                    div.style.marginLeft = style.marginLeft;

                    if (item.type === 'wish') {
                        div.className = `course-block wish-mode`;
                        div.innerHTML = `<div class="cb-name" style="font-size:10px;">(待)${c['課程名稱']}</div>`;
                    } else {
                        div.className = `course-block ${c.is_placeholder ? 'pending' : ''}`;
                        if (!c.is_placeholder) {
                            const bgColor = colorMap[c['課程編號']];
                            div.style.backgroundColor = bgColor;
                            div.style.color = getContrastColor(bgColor);
                            div.style.textShadow = 'none';
                        }
                        const room = getRoomForBlock(c['上課時間/教室'], item.day);
                        let bottomText = c.is_placeholder ? '請選擇老師' : (room || c['授課教師']);
                        div.innerHTML = `<div class="cb-name">${c['課程名稱']}</div><div class="cb-room">${bottomText}</div>`;
                    }

                    div.onclick = () => openDetailModal(c);
                    grid.appendChild(div);
                });
            }

            let reqCredits = 0; let elecCredits = 0;
            mySchedule.forEach(c => {
                const credit = parseFloat(c['學分']) || 0;
                if (c.is_required) reqCredits += credit;
                else elecCredits += credit;
            });
            document.getElementById('totalCredits').innerHTML = `${total} <span style="font-size:12px; color:#666;">(必:${reqCredits} / 選:${elecCredits})</span>`;
        }

        function renderCourseList() {
            const ul = document.getElementById('courseList');
            const key = document.getElementById('searchInput').value.toLowerCase();
            const user = getUserProfile();
            ul.innerHTML = "";

            // Toggle clear button dynamically
            const clearBtn = document.getElementById('searchClearBtn');
            if (clearBtn) {
                clearBtn.style.display = key ? 'inline' : 'none';
            }

            const targetGradeName = GRADE_MAP_REV[user.grade];

            // 1. Determine Search Pool (Ignoring or applying department restrictions)
            const searchAllCheckbox = document.getElementById('searchAllSchool');
            const isSearchAll = (searchAllCheckbox && searchAllCheckbox.checked) || key.startsWith('#');
            const cleanKey = key.startsWith('#') ? key.slice(1) : key;

            let pool;
            if (isSearchAll) {
                pool = allCourses;
            } else {
                pool = allCourses.filter(c => {
                    const isOwnDept = (c.dept_name === user.dept);
                    const isTargetClass = (c.class_name === '不分類' || c.class_name === targetGradeName);
                    const isGeneralUnit = GENERAL_UNITS.includes(c.dept_name);
                    const isProgramCourse = (user.program && user.program.length > 0) && (c['分發條件'] && user.program.some(up => c['分發條件'].includes(up)));
                    return (isOwnDept && isTargetClass) || isGeneralUnit || isProgramCourse;
                });
            }

            // 2. Filter by Keyword
            let sourceFiltered = pool;
            if (cleanKey) {
                sourceFiltered = pool.filter(c => 
                    (c['課程名稱'] || '').toLowerCase().includes(cleanKey) || 
                    (c['授課教師'] || '').toLowerCase().includes(cleanKey) ||
                    (c['課程代碼'] || '').toLowerCase().includes(cleanKey) ||
                    (c['課程編號'] || '').toLowerCase().includes(cleanKey)
                );
            }

            // Helpers to categorize courses dynamically for NCU curriculum structure
            const isGeneralCourse = (c) => {
                const dept = c.dept_name || "";
                return dept.includes("通識") || c['課程名稱'].includes("通識");
            };
            
            const isPeOrOthers = (c) => {
                const dept = c.dept_name || "";
                const isPe = dept.includes("體育") || c['課程名稱'].includes("體育");
                if (isPe) {
                    return c['課程名稱'] !== "大一體育";
                }
                return dept.includes("軍訓") || c['課程名稱'].includes("軍訓") ||
                       dept.includes("服務學習") || c['課程名稱'].includes("服務學習") ||
                       dept.includes("語言") || c['課程名稱'].includes("英文");
            };

            // 3. Filter by Type Chip
            if (currentFilterType !== 'all') {
                sourceFiltered = sourceFiltered.filter(c => {
                    const isOwnDept = (c.dept_name === user.dept);
                    const isGen = isGeneralCourse(c);
                    const isOthers = isPeOrOthers(c);
                    
                    if (currentFilterType === 'dept_required') {
                        return c.is_required && isOwnDept;
                    }
                    if (currentFilterType === 'common_required') {
                        const dept = c.dept_name || "";
                        const isPe = dept.includes("體育") || c['課程名稱'].includes("體育");
                        if (isPe) {
                            return c['課程名稱'] === "大一體育";
                        }
                        return c.is_required && !isOwnDept;
                    }
                    if (currentFilterType === 'dept_elective') {
                        return !c.is_required && isOwnDept;
                    }
                    if (currentFilterType === 'other_elective') {
                        return !c.is_required && !isOwnDept && !isGen && !isOthers;
                    }
                    if (currentFilterType === 'general') {
                        return isGen;
                    }
                    if (currentFilterType === 'others') {
                        return isOthers;
                    }
                    return true;
                });
            }

            // 4. Compute eligibility
            let eligibleList = sourceFiltered.map(c => {
                const res = checkEligibility(c, user);
                const conflict = isConflict(c, mySchedule);
                const added = mySchedule.some(s => s['課程編號'] === c['課程編號']);
                const wished = myWishlist.some(w => w['課程編號'] === c['課程編號']);
                return { ...c, _pass: res.pass, _p: res.priority, _conflict: conflict, _added: added, _wished: wished };
            }).filter(c => c._pass);

            // 5. Tab filtering
            let displayList = [];
            if (currentTab === 'available') {
                displayList = eligibleList.filter(c => !c._conflict || c._added);
            } else if (currentTab === 'wishlist') {
                displayList = eligibleList.filter(c => c._wished);
            } else {
                displayList = eligibleList.filter(c => c._conflict && !c._added);
            }

            // 6. Update counts
            document.getElementById('count-available').innerText = eligibleList.filter(c => !c._conflict || c._added).length;
            document.getElementById('count-conflict').innerText = eligibleList.filter(c => c._conflict && !c._added).length;
            document.getElementById('count-wishlist').innerText = myWishlist.length;

            // 7. Sort
            displayList.sort((a, b) => {
                if (a._added && !b._added) return -1;
                if (!a._added && b._added) return 1;
                return (a._p - b._p) || a['課程編號'].localeCompare(b['課程編號']);
            });

            // 8. Render Limit: max 100 for responsiveness
            displayList.slice(0, 100).forEach(c => {
                const li = document.createElement('li');
                li.className = `course-item ${c._added ? 'added' : ''} ${c._conflict && !c._added ? 'conflict-item' : ''}`;

                const tag = c.is_required ? '<span class="tag req">必修</span>' : '<span class="tag elec">選修</span>';
                const gen = isGeneralCourse(c) ? '<span class="tag gen">通識</span>' : '';
                const wishTag = c._wished ? '<span class="tag" style="background:var(--wish);">待選</span>' : '';
                const pri = (c._p !== 99) ? `<span class="tag pri">順位${c._p}</span>` : '';

                let sourceLabel = c['dept_name'] || "";
                if (sourceLabel.includes('通識') || sourceLabel.includes('體育') || sourceLabel.includes('語言')) {
                    sourceLabel = c['class_name'] || sourceLabel;
                }
                sourceLabel = sourceLabel.replace('學系', '系').replace('研究所', '所');
                
                li.innerHTML = `
                    <span class="c-name"><span class="c-name-text">${c['課程名稱']}</span>${tag}${gen}${wishTag}${pri}</span>
                    <div class="c-info">時間：${c['上課時間/教室'] || '時間未定'} &nbsp;|&nbsp; 教師：${c['授課教師'] || '—'}</div>
                    <div class="c-info" style="color: var(--accent); font-weight: 600; margin-top: 2px;">開課系所：${sourceLabel}</div>
`;
                li.onclick = (e) => {
                    if (e.target.classList.contains('btn-wish')) return;
                    openDetailModal(c);
                };
                ul.appendChild(li);
            });
            
            if (displayList.length === 0) {
                ul.innerHTML = '<li style="padding: 32px 20px; text-align: center; color: var(--text-muted); font-size: 14px; font-weight: 500; list-style: none;"><div style="font-size: 40px; margin-bottom: 12px; color: var(--text-muted);">!</div><div>無符合課程</div><div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">請嘗試調整篩選條件或個人設定</div></li>';
            }
        }

        // [EDITED] Helper to extract room name
        function getRoomForBlock(fullStr, dayIdx) {
            if (!fullStr) return '';
            // Data Mapping: 0=Mon, ... 6=Sun. 
            // We must use a fixed array for Regex matching, ignoring the UI DAYS array change.
            const PARSE_CHARS = ['一', '二', '三', '四', '五', '六', '日'];
            const dayChar = PARSE_CHARS[dayIdx];
            
            const regex = new RegExp(`${dayChar}[0-9A-Z,\-~]+[\(\[\{](.+?)[\)\]\}]`);
            const match = fullStr.match(regex);
            if (match) return match[1];
            const parts = fullStr.split(' ');
            const part = parts.find(p => p.startsWith(dayChar));
            if (part && part.includes('/')) return part.split('/')[1];
            return '';
        }

        function saveProfileToLocal() {
            const p = getUserProfile();
            p.college = document.getElementById('userCollege').value;
            localStorage.setItem('ncu_profile', JSON.stringify(p));
        }

                function loadProfileFromLocal() {
            const saved = localStorage.getItem('ncu_profile');
            if (saved) {
                try {
                    const p = JSON.parse(saved);
                    // Restore college first so dept options populate correctly
                    if (p.college && document.querySelector(`#userCollege option[value="${p.college}"]`)) {
                        document.getElementById('userCollege').value = p.college;
                    }
                    updateDeptOptions();
                    if (p.dept && document.querySelector(`#userDept option[value="${p.dept}"]`)) {
                        document.getElementById('userDept').value = p.dept;
                    }
                    if (p.grade) document.getElementById('userGrade').value = p.grade;
                    if (p.class && document.querySelector(`#userClass option[value="${p.class}"]`)) {
                        document.getElementById('userClass').value = p.class;
                    }
                    if (p.identity) document.getElementById('userIdentity').value = p.identity;
                    if (p.parity) document.getElementById('userParity').value = p.parity;
                    if (p.system) document.getElementById('userSystem').value = p.system;
                    // Restore checked programs after initProgramSelect runs
                    if (p.program && p.program.length > 0) {
                        document.querySelectorAll('#userProgramContainer input').forEach(cb => {
                            cb.checked = p.program.includes(cb.value);
                        });
                    }
                    return;
                } catch(e) { /* fall through to defaults */ }
            }
            // No saved profile -> set sensible defaults
            document.getElementById('userCollege').value = '工學院';
            updateDeptOptions();
            document.getElementById('userDept').value = '機械工程學系';
            document.getElementById('userGrade').value = '1';
            document.getElementById('userClass').value = 'B';
            document.getElementById('userParity').value = 'odd';
        }

        function saveScheduleToLocal() { localStorage.setItem('ncu_schedule', JSON.stringify(mySchedule)); }
        function loadScheduleFromLocal() {
            const saved = localStorage.getItem('ncu_schedule');
            if (saved) { try { mySchedule = JSON.parse(saved); } catch (e) { } }
        }
        function saveWishlistToLocal() { localStorage.setItem('ncu_wishlist', JSON.stringify(myWishlist)); }
        function loadWishlistFromLocal() {
            const saved = localStorage.getItem('ncu_wishlist');
            if (saved) { try { myWishlist = JSON.parse(saved); } catch (e) { } }
        }

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            const tabs = document.querySelectorAll('.tab');
            if (t === 'available') tabs[0].classList.add('active');
            else if (t === 'wishlist') tabs[1].classList.add('active');
            else tabs[2].classList.add('active');
            renderCourseList();
        }

        function resetData() { location.reload(); }
                function clearSchedule() {
            showConfirmModal(
                'danger', '清空全部課表',
                '確定要清空所有已加入的課程（包含正式課表與待選清單）嗎？此操作無法復原。',
                '確認清空', 'danger',
                () => {
                    mySchedule = [];
                    myWishlist = [];
                    saveScheduleToLocal();
                    saveWishlistToLocal();
                    renderTimetable();
                    renderCourseList();
                    showNotify('已全部清空', 'normal');
                }
            );
        }

        function showNotify(msg, type = 'normal') {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.style.background = type === 'error' ? '#e74c3c' : (type === 'success' ? '#27ae60' : '#333');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        }

        // [FIXED] Hybrid Solution: DataURL for Desktop (Stable), Web Share for Mobile (iOS Fix)
        function downloadImage() {
            updateStatus("正在產生圖片...", "pending");
            
            // 1. Clone the node
            const original = document.querySelector('.timetable-container');
            const clone = original.cloneNode(true);
            
            // 2. Configure the clone
            clone.classList.add('export-mode');
            // [FIX] To prevent a blank image, render the clone on-screen but out of sight
            // by placing it at the top-left corner and ensuring it's on top.
            clone.style.position = 'absolute';
            clone.style.top = '0';
            clone.style.left = '0';
            clone.style.zIndex = '9999';
            document.body.appendChild(clone);

            // [EDITED] 3. Capture (CSS controls width/height now)
            html2canvas(clone, { 
                scale: 3, 
                backgroundColor: '#ffffff'
            }).then(canvas => {
                // Cleanup DOM immediately
                document.body.removeChild(clone);

                const timestamp = new Date().toISOString().slice(0,10);
                const fileName = `NCU_Schedule_${timestamp}.png`;

                // 4. Detect Environment
                // Check if it's a mobile device or if the browser supports file sharing natively
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                const canShare = navigator.canShare && navigator.share;

                if (isMobile && canShare) {
                    // === MOBILE STRATEGY (Blob + Share API) ===
                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            // Fallback to Desktop strategy if Blob fails
                            downloadAsDataURL(canvas, fileName);
                            return;
                        }
                        const file = new File([blob], fileName, { type: 'image/png' });

                        // Check if specifically capable of sharing FILES
                        if (navigator.canShare({ files: [file] })) {
                            navigator.share({
                                files: [file],
                                title: 'NCU 課表模擬',
                                text: '我的 114-2 學期課表'
                            }).then(() => {
                                updateStatus("已分享/儲存", "success");
                                setTimeout(() => updateStatus("就緒", "ready"), 2000);
                            }).catch((err) => {
                                console.log("分享取消:", err);
                                updateStatus("就緒", "ready");
                            });
                        } else {
                            // Can't share files? Fallback to DataURL
                            downloadAsDataURL(canvas, fileName);
                        }
                    }, 'image/png');
                } else {
                    // === DESKTOP STRATEGY (Classic DataURL) ===
                    // This is the most stable method for PC/Mac
                    downloadAsDataURL(canvas, fileName);
                }

            }).catch(err => {
                console.error(err);
                showNotify('圖片產生失敗，請重試', 'error');
                if (document.body.contains(clone)) document.body.removeChild(clone);
                updateStatus("錯誤", "error");
            });
        }

        // Helper: Classic Desktop Download
        function downloadAsDataURL(canvas, fileName) {
            const dataUrl = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = fileName;
            document.body.appendChild(a); // Required for Firefox
            a.click();
            document.body.removeChild(a);
            
            updateStatus("下載完成", "success");
            setTimeout(() => updateStatus("就緒", "#555"), 2000);
        }
    </script>
